        {editandoIdx !== null && (
          <button className="btn btn-secondary" onClick={()=>{setEditandoIdx(null);setScreen('reporte');}}>
            Cancelar
          </button>
        )}
      </div>
    </div>
  );

  // ── MONTOS — pre-llenar automáticamente ──────────────────────────────────────
  if (screen === 'montos') return (
    <div className="home-screen slide-up">
      <div className="screen-header">
        <div>
          <div className="header-title">Montos del turno</div>
          <div className="header-sub">{shortSuc(session.sucursal)} · {esArqueo?'Arqueo':'Cierre '+turno}</div>
        </div>
      </div>
      <div className="paso-wrap">
        <div className="msg msg-success" style={{textAlign:'left'}}>
          ✅ {pasos.length} evidencias registradas
        </div>
        {errorMsg && <div className="msg msg-error">{errorMsg}</div>}
        {(montosAuto.ventas_totales !== null || montosAuto.tarjeta !== null || montosAuto.gastos !== null) && (
          <div className="msg" style={{background:'var(--accent-dim)',border:'1px solid rgba(249,115,22,.3)',color:'var(--accent)',textAlign:'left',fontSize:'12px'}}>
            💡 Ventas, tarjeta y gastos se toman automáticamente desde las evidencias.
          </div>
        )}

        <div className="monto-group">
          <div className="monto-field">
            <div className="monto-label">
              Ventas Totales
              {montosAuto.ventas_totales !== null && <span style={{fontSize:'10px',color:'var(--accent)',marginLeft:'6px',fontWeight:400}}>auto-llenado</span>}
            </div>
            <div className="monto-wrap"><span className="monto-peso">$</span>
              <input className="monto-input" type="number" placeholder="0.00" inputMode="decimal"
                value={finanzas.ventasTotales ? String(finanzas.ventasTotales) : '0'}
                readOnly={true}
                style={{background:'var(--surface2)', cursor:'not-allowed'}} /></div>
          </div>
          <div className="monto-field">
            <div className="monto-label">
              Pago con Tarjeta
              {montosAuto.tarjeta !== null && <span style={{fontSize:'10px',color:'var(--accent)',marginLeft:'6px',fontWeight:400}}>auto-llenado</span>}
            </div>
            <div className="monto-wrap"><span className="monto-peso">$</span>
              <input className="monto-input" type="number" placeholder="0.00" inputMode="decimal"
                value={finanzas.tarjeta ? String(finanzas.tarjeta) : '0'}
                readOnly={true}
                style={{background:'var(--surface2)', cursor:'not-allowed'}} /></div>
          {montosAuto.tarjeta === null && (
            <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'4px'}}>
              Se llena automáticamente desde Vouchers Bancarios
            </div>
          )}
          </div>
          <div className="monto-field">
            <div className="monto-label">
              Efectivo contado manual
            </div>
            <div className="monto-wrap"><span className="monto-peso">$</span>
              <input className="monto-input" type="number" placeholder="0.00" inputMode="decimal"
                value={montosData.efectivo}
                onChange={e=>{ setMonto('efectivo',e.target.value); setErrorMsg(''); }} /></div>
            <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'4px'}}>
              El sistema calculará faltante o sobrante sin mostrar el efectivo esperado.
            </div>
          </div>
          {!esArqueo && <div className="monto-field">
            <div className="monto-label">Sueldos del turno</div>
            <div className="sueldo-lista">
              {montosData.sueldos.map((s,i) => (
                <div key={i} className="sueldo-row">
                  <input className="sueldo-nombre" type="text" placeholder="Nombre" value={s.nombre} onChange={e=>setSueldo(i,'nombre',e.target.value)} />
                  <input className="sueldo-monto" type="number" placeholder="$" inputMode="decimal" value={s.monto} onChange={e=>setSueldo(i,'monto',e.target.value)} />

                </div>
              ))}
              <button className="btn-add-sueldo" onClick={addSueldo}>+ Agregar empleado</button>
            </div>
            {sueldosTotal > 0 && <div style={{fontSize:'12px',color:'var(--text-dim)',marginTop:'4px'}}>Total: {fmtPeso(sueldosTotal)}</div>}

            <div key={k} className="monto-field">
              <div className="monto-label">
                {l}

              </div>
              <div className="monto-wrap"><span className="monto-peso">$</span>
                <input className="monto-input" type="number" placeholder="0.00" inputMode="decimal"
                  value={autoVal !== null ? String(autoVal) : montosData[k]}

                  readOnly={autoVal !== null}
                  style={{background: autoVal !== null ? 'var(--surface2)' : '', cursor: autoVal !== null ? 'not-allowed' : ''}} /></div>
            </div>

          <div className="resumen-financiero" style={{marginTop:'4px'}}>
            {finanzas.efectivoCapturado ? (
              <React.Fragment>

                  <span className="resumen-fin-valor resumen-fin-alert">{fmtPeso(finanzas.faltante)}</span>
                </div>
                <div className="resumen-fin-row">
                  <span className="resumen-fin-label" style={{color:'var(--success)'}}>Sobrante automático</span>
                  <span className="resumen-fin-valor" style={{color:'var(--success)'}}>{fmtPeso(finanzas.sobrante)}</span>
                </div>
              </React.Fragment>
            ) : (
              <div className="resumen-fin-row">
                <span className="resumen-fin-label">Faltante/Sobrante</span>
                <span className="resumen-fin-valor" style={{color:'var(--text-dim)'}}>Captura efectivo</span>
              </div>
            )}
          </div>
        </div>
        <button className="btn btn-primary" onClick={()=>{
          if (!String(montosData.efectivo).trim()) {
            setErrorMsg('Captura el efectivo contado para calcular faltante o sobrante.');
            return;
          }
          setErrorMsg('');
          setScreen('reporte');
        }}>Ver reporte →</button>
      </div>
    </div>
  );

  // ── REPORTE DE EVIDENCIAS ────────────────────────────────────────────────────
  if (screen === 'reporte') return (
    <div className="home-screen slide-up">
      {modalFoto}
      <div className="screen-header">
        <button className="header-back" onClick={()=>setScreen('montos')}>‹</button>
        <div>
          <div className="header-title">Reporte de evidencias</div>
          <div className="header-sub">{shortSuc(session.sucursal)} · {session.nombre}</div>
        </div>
      </div>
      <div className="paso-wrap">

        <div className="section-label" style={{marginBottom:'10px'}}>Evidencias capturadas</div>
        <div className="reporte-section">
          {registros.map((r,i) => (
            <div key={r.id} className="reporte-card">
              <div className="reporte-card-header">
                <span className="reporte-card-icon">{r.estado==='listo'?'✅':'—'}</span>
                <span className="reporte-card-title">{r.label}</span>
                <span className={`reporte-card-status ${r.estado}`}>{r.estado==='listo'?r.hora:'Omitida'}</span>
                {r.estado === 'listo' && (
                  <button className="btn-editar-ev" onClick={()=>editarEvidencia(i)}>Editar</button>
                )}
              </div>
              {r.estado === 'listo' && (
                <div className="reporte-card-meta">
                  {r.importe && (() => {
                    const sinPeso = ['reporte_corte','cancelados','cortesias','sobre_reverso'];
                    const val = parseFloat(r.importe)||0;
                    return <span>💰 {(IMPORTE_CONFIG[r.id]||IMPORTE_CONFIG.default).label}: <strong>{sinPeso.includes(r.id) ? r.importe : fmtPeso(val)}</strong></span>;
                  })()}
                  {r.ticketsCanceladosCorte && parseFloat(r.ticketsCanceladosCorte)>0 && (
                    <span>❌ Tickets cancelados en corte: <strong>{r.ticketsCanceladosCorte}</strong></span>
                  )}
                  {r.ticketTiempos && (r.ticketTiempos.t20 || r.ticketTiempos.t30 || r.ticketTiempos.t40 || r.ticketTiempos.t60 || r.ticketTiempos.limpieza) && (
                    <span>Tickets por tiempo: 20m {r.ticketTiempos.t20||0} | 30m {r.ticketTiempos.t30||0} | 40m {r.ticketTiempos.t40||0} | 60m {r.ticketTiempos.t60||0} | Limpieza {r.ticketTiempos.limpieza||0}</span>
                  )}
                  {r.gastosDetalle?.length > 0 && (
                    <span>🏷️ Gastos: {r.gastosDetalle.map(g => `${g.clasificacion} ${fmtPeso(parseFloat(g.monto)||0)}`).join(' · ')}</span>
                  )}
                  {r.comentario && <span>💬 {r.comentario}</span>}
                  {r.fotos?.length > 0 && (
                    <div className="reporte-card-fotos">
                      {r.fotos.map((f,j) => (
                        <img key={j} src={f} className="reporte-foto-mini" alt={`Foto ${j+1}`} onClick={()=>setFotoModal(f)} />
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          ))}
        </div>

        <div className="section-label" style={{marginBottom:'10px',marginTop:'8px'}}>Resumen financiero</div>
        <div className="resumen-financiero">
          {montosAuto.total_tickets !== null && (
            <div className="resumen-fin-row">
              <span className="resumen-fin-label">🎟️ Total Tickets</span>
              <span className="resumen-fin-valor">{montosAuto.total_tickets}</span>
            </div>
          )}
          {ticketsCanceladosDelCorte && parseFloat(ticketsCanceladosDelCorte)>0 && (
            <div className="resumen-fin-row">
              <span className="resumen-fin-label">Tickets cancelados del corte</span>
              <span className="resumen-fin-valor">{ticketsCanceladosDelCorte}</span>
            </div>
          )}
          {cortesiasDelTurno && parseFloat(cortesiasDelTurno)>0 && (
            <div className="resumen-fin-row">
              <span className="resumen-fin-label">Cortesias</span>
              <span className="resumen-fin-valor">{cortesiasDelTurno}</span>
            </div>
          )}
          {(ticketTiemposDelCorte.t20 || ticketTiemposDelCorte.t30 || ticketTiemposDelCorte.t40 || ticketTiemposDelCorte.t60 || ticketTiemposDelCorte.limpieza) && (
            <React.Fragment>
              {[
                ['Tickets 20 min', ticketTiemposDelCorte.t20],
                ['Tickets 30 min', ticketTiemposDelCorte.t30],
                ['Tickets 40 min', ticketTiemposDelCorte.t40],
                ['Tickets 60 min', ticketTiemposDelCorte.t60],
                ['Tickets limpieza', ticketTiemposDelCorte.limpieza],
              ].map(([l,v]) => (
                <div key={l} className="resumen-fin-row">
                  <span className="resumen-fin-label">{l}</span>
                  <span className="resumen-fin-valor">{parseFloat(v)||0}</span>
                </div>
              ))}
            </React.Fragment>
          )}
          {montosAuto.cancelados !== null && !ticketsCanceladosDelCorte && (
            <div className="resumen-fin-row">
              <span className="resumen-fin-label">❌ Tickets Cancelados</span>
              <span className="resumen-fin-valor">{montosAuto.cancelados}</span>
            </div>
          )}
          {montosAuto.ventas_totales !== null && (
            <div className="resumen-fin-row">
              <span className="resumen-fin-label">Ventas Totales</span>
              <span className="resumen-fin-valor">{fmtPeso(finanzas.ventasTotales)}</span>
            </div>
          )}
          {[
            ['Pago con Tarjeta', finanzas.tarjeta],
            ['Efectivo contado manual', finanzas.efectivoReal],
            ...(esArqueo ? [] : [['Sueldos', sueldosTotal]]),
            ['Gastos',           finanzas.gastos],
            ['Extras',           finanzas.extras],
          ].map(([l,v]) => (
            <div key={l} className="resumen-fin-row">
              <span className="resumen-fin-label">{l}</span>
              <span className="resumen-fin-valor">{fmtPeso(parseFloat(v)||0)}</span>
            </div>
          ))}
          {finanzas.faltante>0 && (
            <div className="resumen-fin-row">
              <span className="resumen-fin-label resumen-fin-alert">⚠️ Faltante automático</span>
              <span className="resumen-fin-valor resumen-fin-alert">{fmtPeso(finanzas.faltante)}</span>
            </div>
          )}
          {finanzas.sobrante>0 && (
            <div className="resumen-fin-row">
              <span className="resumen-fin-label" style={{color:'var(--success)'}}>✅ Sobrante automático</span>
              <span className="resumen-fin-valor" style={{color:'var(--success)'}}>{fmtPeso(finanzas.sobrante)}</span>
            </div>
          )}
          {finanzas.pendiente>0 && (
            <div className="resumen-fin-row">
              <span className="resumen-fin-label" style={{color:'var(--warning)'}}>🕐 Pdte. Depositar</span>
              <span className="resumen-fin-valor" style={{color:'var(--warning)'}}>{fmtPeso(finanzas.pendiente)}</span>
            </div>
          )}
          <div className="resumen-fin-row resumen-fin-neto">
            <span className="resumen-fin-label">Efectivo contado</span>
            <span className="resumen-fin-valor">{fmtPeso(efectivoNeto)}</span>
          </div>
        </div>

        <button className="btn btn-primary" onClick={()=>setScreen('resumen')}>Confirmar cierre →</button>
      </div>
    </div>
  );

  // ── RESUMEN FINAL ─────────────────────────────────────────────────────────────
  if (screen === 'resumen') return (
    <div className="home-screen slide-up">
      {modalFoto}
      <div className="screen-header">
        <button className="header-back" onClick={()=>setScreen('reporte')}>‹</button>
        <div>
          <div className="header-title">Confirmar envío</div>
          <div className="header-sub">{shortSuc(session.sucursal)} · {esArqueo?'Arqueo':'Cierre '+turno}</div>
        </div>
      </div>
      <div className="paso-wrap">
        <div className="msg msg-warn" style={{textAlign:'left'}}>
          <strong>Revisa antes de enviar.</strong> Una vez confirmado no podrás modificar las evidencias.
        </div>

        <div>
          <div className="section-label" style={{marginBottom:'8px'}}>Evidencias ({registros.filter(r=>r.estado==='listo').length} enviadas, {registros.filter(r=>r.estado==='omitida').length} omitidas)</div>
          <div className="ev-lista">
            {registros.map(r => (
              <div key={r.id} className="ev-row">
                <span className="ev-icon">{r.estado==='listo'?'✅':'—'}</span>
                <span className="ev-label">{r.label}</span>
                <span className={`ev-status ${r.estado}`}>
                  {r.estado==='listo' ? `${r.fotos?.length||1} foto(s) · ${r.hora}` : 'Omitida'}
                </span>
              </div>
            ))}
          </div>
        </div>

        <div className="neto-card" style={{marginTop:'4px'}}>
          <div className="neto-left">Efectivo contado</div>
          <div className="neto-valor" style={{fontSize:'32px'}}>{fmtPeso(efectivoNeto)}</div>
          {(finanzas.faltante > 0 || finanzas.sobrante > 0) && (
            <div style={{fontSize:'12px',color:finanzas.faltante>0?'var(--error)':'var(--success)',marginTop:'6px'}}>
              {finanzas.faltante>0 ? 'Faltante: ' + fmtPeso(finanzas.faltante) : 'Sobrante: ' + fmtPeso(finanzas.sobrante)}
            </div>
          )}
        </div>

        <button className="btn btn-primary" onClick={enviarCierre}>Enviar cierre ✓</button>
        <button className="btn btn-secondary" onClick={()=>setScreen('reporte')}>Revisar reporte</button>
      </div>
    </div>
  );

  // ── ÉXITO ─────────────────────────────────────────────────────────────────────
  if (screen === 'exito') return (
    <div className="exito-screen fade-in">
      {modalFoto}
      <div className="exito-icon">✅</div>
      <div className="exito-suc">{getBrand(session.sucursal)} · {shortSuc(session.sucursal)}</div>
      <div className="exito-titulo">{esArqueo?'ARQUEO':'CIERRE '+turno}<br/>ENVIADO</div>
      <div className="exito-sub">
        Todas las evidencias fueron subidas a Google Drive correctamente.
        Registrado a nombre de <strong>{session.nombre}</strong>.
      </div>
      <button className="btn btn-primary" style={{maxWidth:'320px',width:'100%',marginBottom:'10px'}} onClick={()=>setScreen('comprobante')}>
        📄 Ver comprobante
      </button>
      <button className="btn btn-secondary" style={{maxWidth:'320px',width:'100%'}} onClick={onCompletado}>
        Volver al inicio
      </button>
    </div>
  );

  // ── COMPROBANTE ───────────────────────────────────────────────────────────────
  if (screen === 'comprobante') return (
    <Comprobante
      session={session}
      turno={turno}
      registros={registros}
      montosData={montosData}
      efectivoNeto={efectivoNeto}
      sueldosTotal={sueldosTotal}
      montosAuto={montosAuto}
      onVolver={() => setScreen('exito')}
    />
  );

  return null;
}


function LoginScreen({ onLogin }) {
  const [usuario,  setUsuario]  = useState('');
  const [password, setPassword] = useState('');
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState('');
  const [showPass, setShowPass] = useState(false);
  const [online,   setOnline]   = useState(navigator.onLine);

  useEffect(() => {
    const updateOnline = () => setOnline(navigator.onLine);
    window.addEventListener('online', updateOnline);
    window.addEventListener('offline', updateOnline);
    return () => {
      window.removeEventListener('online', updateOnline);
      window.removeEventListener('offline', updateOnline);
    };
  }, []);

  const submit = async () => {
    if (!online) {
      setError('Sin conexión. Revisa tu internet e intenta nuevamente.');
      return;
    }
    if (!usuario.trim() || !password.trim()) {
      setError('Ingresa tu usuario y contraseña para continuar.');
      return;
    }
    setLoading(true);
    setError('');
    try {
      const res = await callScript({
        action: 'login',
        u: usuario.trim().toLowerCase(),
        p: password.trim()
      });
      if (res.success) {
        onLogin(res);
      } else {
        setError(res.error || 'Usuario o contraseña incorrectos.');
      }
    } catch(err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  const onKey = (e) => { if (e.key === 'Enter') submit(); };

  return (
    <div className="login-screen">
      <div className="login-bg" />
      <div className="login-grid" />
      <div className="login-content fade-in">

        {/* Logo */}
        <div>
          <div className="login-badge">
            <div className="login-badge-dot" />
            <span className="login-badge-text">GF Diversiones</span>
          </div>
          <div className="login-title">
            CORTE<br />Y <span>CIERRE</span>
          </div>
          <div className="login-subtitle">Registro de evidencias de cierre</div>
        </div>

        {/* Formulario */}
        <div className="login-form">
          {!online && <div className="msg msg-warn">Sin conexión. Revisa tu internet antes de iniciar sesión.</div>}
          {error && <div className="msg msg-error">{error}</div>}

          <div className="field">
            <label className="field-label">Usuario</label>
            <input
              className={`field-input ${error ? 'has-error' : ''}`}
              type="text" placeholder="usuario_sucursal"
              value={usuario}
              onChange={e => { setUsuario(e.target.value); setError(''); }}
              onKeyDown={onKey}
              autoCapitalize="none" autoCorrect="off" autoComplete="username"
            />
          </div>

          <div className="field">
            <label className="field-label">Contraseña</label>
            <div style={{position:'relative'}}>
              <input
                className={`field-input ${error ? 'has-error' : ''}`}
                type={showPass ? 'text' : 'password'} placeholder="••••••••"
                value={password}
                onChange={e => { setPassword(e.target.value); setError(''); }}
                onKeyDown={onKey}
                autoComplete="current-password"
                style={{paddingRight:'52px'}}
              />
              <button
                className="btn-icon"
                type="button"
                aria-label={showPass ? 'Ocultar contraseña' : 'Mostrar contraseña'}
                onClick={() => setShowPass(p => !p)}
                style={{
                  position:'absolute', right:'14px', top:'50%', transform:'translateY(-50%)',
                }}
              >
                <span className={`eye-icon ${showPass ? 'blinking' : ''}`} />
              </button>
            </div>
          </div>

          <button className="btn btn-primary" onClick={submit} disabled={loading}>
            {loading && <span className="spinner" />}
            {loading ? 'Verificando...' : 'Iniciar sesión'}
          </button>
          <div className="app-version">{APP_VERSION}</div>
        </div>

      </div>
    </div>
  );
}

// PANTALLA: COMPROBANTE DE ENVÍO
// ═══════════════════════════════════════════════════════════════════════════════════
function Comprobante({ session, turno, registros, montosData, efectivoNeto, sueldosTotal, montosAuto, onVolver, fechaOverride, horaOverride }) {
  const esArqueo = turno === 'arqueo';
  const fecha    = fechaOverride || getFechaArchivo();
  const hora     = horaOverride || getHoraCorta();
  const brand    = getBrand(session.sucursal);
  const logo     = LOGOS[brand];

  const enviadas = registros.filter(r => r.estado === 'listo');
  const omitidas = registros.filter(r => r.estado === 'omitida');

  const finanzas = calcularFinanzas(montosData, sueldosTotal, montosAuto);
  const tarjeta  = finanzas.tarjeta;
  const efectivo = finanzas.efectivoReal;
  const gastos   = finanzas.gastos;
  const extras   = finanzas.extras;
  const faltante = finanzas.faltante;
  const sobrante = finanzas.sobrante;
  const pendiente= finanzas.pendiente;
  const reporteCorteReg = registros.find(r => r.id === 'reporte_corte' && r.estado === 'listo');
  const ticketTiempos = reporteCorteReg?.ticketTiempos || {};
  const ticketsCancelados = parseFloat(reporteCorteReg?.ticketsCanceladosCorte) || 0;
  const cortesias = parseFloat(registros.find(r => r.id === 'cortesias' && r.estado === 'listo')?.importe) || 0;
  const totalTickets = parseFloat(montosAuto?.total_tickets ?? reporteCorteReg?.importe) || 0;
  const mostrarTickets = totalTickets || ticketsCancelados || cortesias || ['t20','t30','t40','t60','limpieza'].some(k => parseFloat(ticketTiempos[k]) > 0);

  return (
    <div className="comprobante-screen">
      {/* Barra superior con botón */}
      <div className="comprobante-header-bar">
        <span className="comprobante-header-bar-title">Comprobante de Cierre</span>
        <button className="comprobante-btn-captura" onClick={onVolver}>← Volver</button>
      </div>

      <div className="comprobante-body">

        {/* Tip */}
        <div className="comp-tip">
          📸 Toma una captura de pantalla y envíala como evidencia de envío
        </div>

        {/* Cabecera */}
        <div className="comp-top">
          {logo && <img src={logo} className="comp-logo" alt={brand} />}
          <div className="comp-sucursal">{session.sucursal}</div>
          <div className="comp-fecha">{fecha} · {hora} hrs</div>
          <div className="comp-empleado">👤 {session.nombre}</div>
          <div>
            <span className="comp-turno-badge">
              {esArqueo ? '🗂 Arqueo' : `📋 Cierre ${turno}`}
            </span>
          </div>
        </div>

        {/* Sello ENVIADO */}
        <div className="comp-sello-wrap">
          <div className="comp-sello">
            <div className="comp-sello-txt">ENVIADO</div>
            <div className="comp-sello-sub">✓ REGISTRADO EN DRIVE</div>
          </div>
        </div>

        {/* Resumen financiero */}
        <div className="comp-section-title">Resumen Financiero</div>
        <table className="comp-fin-table">
          <tbody>
            <tr className="comp-fin-row"><td>Ventas Totales</td><td>{fmtPeso(finanzas.ventasTotales)}</td></tr>
            {mostrarTickets && <tr className="comp-fin-row"><td>Total Tickets</td><td>{totalTickets}</td></tr>}
            {ticketsCancelados > 0 && <tr className="comp-fin-row"><td>Tickets cancelados</td><td>{ticketsCancelados}</td></tr>}
            {cortesias > 0 && <tr className="comp-fin-row"><td>Cortesias</td><td>{cortesias}</td></tr>}
            {mostrarTickets && [
              ['Tickets 20 min', ticketTiempos.t20],
              ['Tickets 30 min', ticketTiempos.t30],
              ['Tickets 40 min', ticketTiempos.t40],
              ['Tickets 60 min', ticketTiempos.t60],
              ['Tickets limpieza', ticketTiempos.limpieza],
            ].map(([l,v]) => (
              <tr key={l} className="comp-fin-row">
                <td style={{paddingLeft:'12px',color:'#888',fontSize:'11px'}}>{l}</td>
                <td style={{color:'#888',fontSize:'11px'}}>{parseFloat(v)||0}</td>
              </tr>
            ))}
            <tr className="comp-fin-row"><td>Pago con Tarjeta</td><td>{fmtPeso(tarjeta)}</td></tr>
            <tr className="comp-fin-row"><td>Efectivo contado manual</td><td>{fmtPeso(efectivo)}</td></tr>
            {!esArqueo && <tr className="comp-fin-row"><td>Sueldos</td><td>{fmtPeso(sueldosTotal)}</td></tr>}
            {!esArqueo && montosData.sueldos?.filter(s=>s.nombre).map((s,i) => (
              <tr key={i} className="comp-fin-row">
                <td style={{paddingLeft:'12px',color:'#888',fontSize:'11px'}}>· {s.nombre}</td>
                <td style={{color:'#888',fontSize:'11px'}}>{fmtPeso(parseFloat(s.monto)||0)}</td>
              </tr>
            ))}
            <tr className="comp-fin-row"><td>Gastos</td><td>{fmtPeso(gastos)}</td></tr>
            {extras > 0 && <tr className="comp-fin-row"><td>Extras</td><td>{fmtPeso(extras)}</td></tr>}
            {faltante > 0 && (
              <tr className="comp-fin-row comp-fin-alert"><td>⚠️ Faltante</td><td>{fmtPeso(faltante)}</td></tr>
            )}
            {sobrante > 0 && (
              <tr className="comp-fin-row comp-fin-success"><td>✅ Sobrante</td><td>{fmtPeso(sobrante)}</td></tr>
            )}
            {pendiente > 0 && (
              <tr className="comp-fin-row"><td>🕐 Pdte. Depositar</td><td>{fmtPeso(pendiente)}</td></tr>
            )}
            <tr className="comp-fin-neto">
              <td>EFECTIVO CONTADO</td>
              <td style={{color:'var(--accent)'}}>{fmtPeso(efectivoNeto)}</td>
            </tr>
          </tbody>
        </table>

        {/* Tabla de evidencias */}
        <div className="comp-section-title">Evidencias ({enviadas.length} enviadas · {omitidas.length} omitidas)</div>
        <table className="comp-ev-table">
          <tbody>
            {registros.map((r,i) => (
              <tr key={i} className={`comp-ev-row ${r.estado === 'omitida' ? 'comp-ev-omitida' : ''}`}>
                <td>{r.estado === 'listo' ? '✅' : '—'}</td>
                <td>
                  {r.label}
                  {r.importe && r.estado === 'listo' && (
                    <span style={{fontSize:'10px',color:'#888',marginLeft:'6px'}}>
                      ({['reporte_corte','cancelados','sobre_reverso'].includes(r.id) ? r.importe : fmtPeso(parseFloat(r.importe)||0)})
                    </span>
                  )}
                </td>
                <td>{r.estado === 'listo' ? (r.fotos?.length > 1 ? `${r.fotos.length} fotos · ${r.hora}` : r.hora) : 'Omitida'}</td>
              </tr>
            ))}
          </tbody>
        </table>

        {/* Footer */}
        <div className="comp-footer">
          <div className="comp-qr-placeholder">📄</div>
          <div className="comp-footer-line">GF Diversiones · Sistema de Corte y Cierre</div>
          <div className="comp-footer-line" style={{marginTop:'2px'}}>Generado el {fecha} a las {hora} hrs</div>
        </div>

      </div>
    </div>
  );
}

function ResumenBloqueado({ data, onClose }) {
  if (!data) return null;
  const sessionBloqueada = {
    sucursal: data.sucursal || '',
    nombre: data.nombre || '',
  };
  const registros = data.registros || [];
  const montosData = data.montosData || {
    tarjeta:'', efectivo:'', gastos:'', extras:'',
    faltante:'', sobrante:'', pendiente:'',
    sueldos:[]
  };
  const sueldosTotal = parseFloat(data.sueldosTotal) || 0;
  const montosAuto = data.montosAuto || {};
  const efectivoNeto = parseFloat(data.finanzas?.efectivoNeto) || 0;
  return (
    <div className="foto-modal" onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{width:'100%',height:'100%',overflow:'auto'}}>
        <Comprobante
          session={sessionBloqueada}
          turno={data.turno}
          registros={registros}
          montosData={montosData}
          efectivoNeto={efectivoNeto}
          sueldosTotal={sueldosTotal}
          montosAuto={montosAuto}
          fechaOverride={data.fecha}
          horaOverride={data.hora}
          onVolver={onClose}
        />
      </div>
    </div>
  );
}

// PANTALLA: HOME ADMIN / MAESTRO
// ═══════════════════════════════════════════════════════════════════════════════════
function HomeAdmin({ session, onLogout }) {
  const { useState:useS, useEffect:useE } = React;
  const esMaestro = (session.rol||'').toLowerCase() === 'maestro';
  const misSucs   = esMaestro ? SUCURSALES_ALL : (session.sucursalesAsignadas||[]);

  const [tab,      setTab]      = useS('dashboard');
  const [fecha,    setFecha]    = useS(fechaHoy());
  const [periodoMes,setPeriodoMes]= useS(() => {
    const [d,m,y] = fechaHoy().split('-');
    return `${y}-${m}`;
  });
  const [registros,setRegistros]= useS([]);
  const [loading,  setLoading]  = useS(false);
  const [detalle,  setDetalle]  = useS(null);
  const [users,    setUsers]    = useS([]);
  const [modalUser,setModalUser]= useS(null);
  const [busqueda, setBusqueda] = useS('');
  const [msgExito, setMsgExito] = useS('');
  const [editCorte,setEditCorte]= useS(null);

  // Cargar dashboard
  const cargarDashboard = async () => {
    setLoading(true);
    try {
      const sucsParam = esMaestro ? '' : misSucs.join('|');
      const res = await apiGet({ action:'getDashboard', fecha, sucursales:sucsParam });
      if (res.success) setRegistros(res.registros||[]);
    } catch(e) {}
    setLoading(false);
  };

  useE(() => { if (tab==='dashboard') cargarDashboard(); }, [fecha, tab]);

  // Cargar usuarios
  const cargarUsuarios = async () => {
    setLoading(true);
    try {
      const res = await apiGet({ action:'getUsers' });
      if (res.success) setUsers(res.users||[]);
    } catch(e) {}
    setLoading(false);
  };

  useE(() => { if (tab==='usuarios' && esMaestro) cargarUsuarios(); }, [tab]);

  // Desbloquear cierre
  const desbloquear = async (reg) => {
    if (!confirm(`¿Desbloquear ${reg.turno} de ${shortSuc(reg.sucursal)} del ${reg.fecha}?`)) return;
    try {
      const res = await apiPost({ action:'desbloquear', sucursal:reg.sucursal, turno:reg.turno, fecha:reg.fecha, solicitante:session.nombre||'maestro' });
      if (res.success) {
        setMsgExito('Cierre desbloqueado correctamente.');
        cargarDashboard();
        setTimeout(()=>setMsgExito(''),3000);
      }
    } catch(e) { alert('Error al desbloquear'); }
  };

  const abrirEditorCorte = (reg) => {
    setEditCorte({
      ventasTotales: reg.ventasTotales || 0,
      tarjeta:       reg.tarjeta || 0,
      efectivo:      reg.efectivo || 0,
      sueldos:       reg.sueldos || 0,
      gastos:        reg.gastos || 0,
      extras:        reg.extras || 0,
        faltante:      reg.faltante || 0,
        sobrante:      reg.sobrante || 0,
        pendiente:     reg.pendiente || 0,
        totalTickets:   reg.totalTickets || '',
        ticketsCanceladosCorte: reg.ticketsCanceladosCorte || '',
    });
  };

  const setEditMonto = (k,v) => setEditCorte(prev => ({...prev, [k]:v}));
  const moneyEdit = (k) => parseFloat(editCorte?.[k]) || 0;
  const efectivoEditado = editCorte
    ? moneyEdit('ventasTotales') - moneyEdit('tarjeta')
    : 0;
  const netoEditado = editCorte
    ? efectivoEditado - moneyEdit('sueldos') - moneyEdit('gastos') - moneyEdit('extras') - moneyEdit('faltante') + moneyEdit('sobrante') + moneyEdit('pendiente')
    : 0;

  const guardarEdicionCorte = async () => {
    if (!detalle || !editCorte) return;
    try {
      const montos = {
        ventasTotales: moneyEdit('ventasTotales'),
        tarjeta:       moneyEdit('tarjeta'),
        efectivo:      efectivoEditado,
        sueldos:       moneyEdit('sueldos'),
        gastos:        moneyEdit('gastos'),
        extras:        moneyEdit('extras'),
        faltante:      moneyEdit('faltante'),
        sobrante:      moneyEdit('sobrante'),
        pendiente:     moneyEdit('pendiente'),
        efectivoNeto:  netoEditado,
        totalTickets:   moneyEdit('totalTickets'),
        ticketsCanceladosCorte: moneyEdit('ticketsCanceladosCorte'),
      };
      const res = await apiPost({
        action:'updateCierre',
        sucursal:detalle.sucursal,
        turno:detalle.turno,
        fecha:detalle.fecha,
        solicitante:session.nombre||'maestro',
        montos
      });
      if (!res.success) throw new Error(res.error || 'No se pudo guardar.');
      const nuevoDetalle = {
        ...detalle,
        ventasTotales: montos.ventasTotales,
        tarjeta:       montos.tarjeta,
        efectivo:      montos.efectivo,
        sueldos:       montos.sueldos,
        gastos:        montos.gastos,
        extras:        montos.extras,
        faltante:      montos.faltante,
        sobrante:      montos.sobrante,
        pendiente:     montos.pendiente,
        totalTickets:   montos.totalTickets,
        ticketsCanceladosCorte: montos.ticketsCanceladosCorte,
        neto:          montos.efectivoNeto,
        estado:        'MODIFICADO',
      };
      setDetalle(nuevoDetalle);
      setRegistros(prev => prev.map(r =>
        r.sucursal===detalle.sucursal && String(r.turno)===String(detalle.turno) && r.fecha===detalle.fecha
          ? nuevoDetalle
          : r
      ));
      await subirExcelCorreccion(nuevoDetalle);
      setEditCorte(null);
      setMsgExito('Corte modificado y Excel reemplazado.');
      setTimeout(()=>setMsgExito(''),3000);
    } catch(e) {
      alert('Error al modificar el corte: ' + e.message);
    }
  };

  // Guardar usuario
  const guardarUsuario = async (formData) => {
    try {
      await apiPost({ action:'saveUser', ...formData });
      setModalUser(null);
      cargarUsuarios();
    } catch(e) { alert('Error al guardar'); }
  };

  // Toggle activo
  const toggleActivo = async (user) => {
    try {
      await apiPost({ action:'toggleUser', idx:user.idx, activo:!user.activo });
      cargarUsuarios();
    } catch(e) {}
  };

  // Agrupar registros por sucursal
  const getSucursalData = (suc) => registros.filter(r=>r.sucursal===suc);
  const getTurnoReg = (suc, turno) => registros.find(r=>r.sucursal===suc && String(r.turno)===String(turno));

  // Sucursales a mostrar
  const sucsConDatos = [...new Set(registros.map(r=>r.sucursal))];
  const sucsMostrar  = esMaestro
    ? [...new Set([...sucsConDatos, ...SUCURSALES_ALL])].sort()
    : misSucs;

  const sucsFiltradas = sucsMostrar.filter(s =>
    !busqueda || s.toLowerCase().includes(busqueda.toLowerCase())
  );

  const numExcel = (v) => parseFloat(v) || 0;
  const nombreSucursalExcel = (suc) => (suc || '').replace(/\s+(LABERINTOS|NEON FLY|BRINKOS)$/i, '');

  const sumarTurnoExcel = (lista, suc, turno) => {
    return lista
      .filter(r => r.sucursal === suc && String(r.turno) === String(turno))
      .reduce((acc, r) => ({
        ventasTotales: acc.ventasTotales + numExcel(r.ventasTotales),
        tarjeta: acc.tarjeta + numExcel(r.tarjeta),
        faltante: acc.faltante + numExcel(r.faltante),
        sobrante: acc.sobrante + numExcel(r.sobrante),
        pendiente: acc.pendiente + numExcel(r.pendiente),
        sueldos: acc.sueldos + numExcel(r.sueldos),
        extras: acc.extras + numExcel(r.extras),
        gastos: acc.gastos + numExcel(r.gastos),
        totalTickets: acc.totalTickets + numExcel(r.totalTickets),
        ticketsCanceladosCorte: acc.ticketsCanceladosCorte + numExcel(r.ticketsCanceladosCorte),
        tickets20Min: acc.tickets20Min + numExcel(r.tickets20Min),
        tickets30Min: acc.tickets30Min + numExcel(r.tickets30Min),
        tickets40Min: acc.tickets40Min + numExcel(r.tickets40Min),
        tickets60Min: acc.tickets60Min + numExcel(r.tickets60Min),
        ticketsLimpieza: acc.ticketsLimpieza + numExcel(r.ticketsLimpieza),
        cortesias: acc.cortesias + numExcel(r.cortesias),
      }), {
        ventasTotales:0, tarjeta:0, faltante:0, sobrante:0, pendiente:0,
        sueldos:0, extras:0, gastos:0, totalTickets:0, ticketsCanceladosCorte:0,
        tickets20Min:0, tickets30Min:0, tickets40Min:0, tickets60Min:0,
        ticketsLimpieza:0, cortesias:0,
      });
  };

  const descargarExcelGeneral = (
    lista = registros,
    etiquetaFecha = fecha,
    nombreArchivo = `CONCENTRADO_TODAS_SUCURSALES_${fecha}.xlsx`,
    sucursalesBase = sucsMostrar
  ) => {
    const headers = [
      'FECHA','SUCURSAL','RAZON SOCIAL','VENTA CORTE 1','VENTA CORTE 2','VENTA TOTAL',
      'TARJETAS','IMPORTE TARJETA','FALTANTES','SOBRANTES O MULTA','CAMBIO DOLARES',
      'EFECTIVO','SUELDOS','CLASIFICACION EXTRA','IMPORTE EXTRAS',
      'CLASIFICACION GASTO','IMPORTE GASTOS','CLASIFICACION GASTO','IMPORTE GASTOS',
      'TOTAL SALIDAS EFECTIVO','TOTAL EFECTIVO','TOTAL TICKETS','TICKETS CANCELADOS',
      'TICKETS 20 MIN','TICKETS 30 MIN','TICKETS 40 MIN','TICKETS 60 MIN',
      'TICKETS LIMPIEZA','CORTESIAS',
    ];

    const rows = sucursalesBase.map(suc => {
      const c1 = sumarTurnoExcel(lista, suc, '1');
      const c2 = sumarTurnoExcel(lista, suc, '2');
      const ventaCorte1 = numExcel(c1.ventasTotales);
      const ventaCorte2 = numExcel(c2.ventasTotales);
      const ventaTotal = ventaCorte1 + ventaCorte2;
      const importeTarjeta = numExcel(c1.tarjeta) + numExcel(c2.tarjeta);
      const faltantes = numExcel(c1.faltante) + numExcel(c2.faltante);
      const sobrantes = numExcel(c1.sobrante) + numExcel(c2.sobrante);
      const pendiente = numExcel(c1.pendiente) + numExcel(c2.pendiente);
      const efectivo = ventaTotal - importeTarjeta;
      const sueldos = numExcel(c1.sueldos) + numExcel(c2.sueldos);
      const extras = numExcel(c1.extras) + numExcel(c2.extras);
      const gastos = numExcel(c1.gastos) + numExcel(c2.gastos);
      const totalSalidas = sueldos + extras + gastos;
      const totalEfectivo = efectivo - totalSalidas - faltantes + sobrantes + pendiente;

      return [
        etiquetaFecha, nombreSucursalExcel(suc) || suc, getBrand(suc),
        ventaCorte1, ventaCorte2, ventaTotal,
        importeTarjeta > 0 ? 'TARJETA' : '', importeTarjeta,
        faltantes, sobrantes, 0, efectivo, sueldos,
        extras > 0 ? 'EXTRAS' : '', extras,
        gastos > 0 ? 'GASTOS' : '', gastos, '', 0,
        totalSalidas, totalEfectivo,
        numExcel(c1.totalTickets) + numExcel(c2.totalTickets),
        numExcel(c1.ticketsCanceladosCorte) + numExcel(c2.ticketsCanceladosCorte),
        numExcel(c1.tickets20Min) + numExcel(c2.tickets20Min),
        numExcel(c1.tickets30Min) + numExcel(c2.tickets30Min),
        numExcel(c1.tickets40Min) + numExcel(c2.tickets40Min),
        numExcel(c1.tickets60Min) + numExcel(c2.tickets60Min),
        numExcel(c1.ticketsLimpieza) + numExcel(c2.ticketsLimpieza),
        numExcel(c1.cortesias) + numExcel(c2.cortesias),
      ];
    });

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    ws['!cols'] = headers.map(h => ({ wch: Math.max(12, Math.min(22, h.length + 2)) }));
    ws['!autofilter'] = { ref: XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:rows.length,c:headers.length-1}}) };
    headers.forEach((h,i) => {
      const cell = ws[XLSX.utils.encode_cell({r:0,c:i})];
      if (!cell) return;
      const calculada = /VENTA TOTAL|EFECTIVO|TOTAL SALIDAS|TOTAL TICKETS|TICKETS/i.test(h);
      cell.s = {
        fill: { fgColor: { rgb: calculada ? 'D9EAD3' : 'D9EAF7' } },
        font: { bold: true, color: { rgb: '000000' } },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
      };
    });
    XLSX.utils.book_append_sheet(wb, ws, 'Concentrado');
    XLSX.writeFile(wb, nombreArchivo);
  };

  const descargarExcelMensual = async () => {
    if (!periodoMes) return alert('Selecciona un mes.');
    const [anio, mes] = periodoMes.split('-');
    const ultimoDia = new Date(parseInt(anio,10), parseInt(mes,10), 0).getDate();
    const fechaInicio = `01-${mes}-${anio}`;
    const fechaFin = `${String(ultimoDia).padStart(2,'0')}-${mes}-${anio}`;
    setLoading(true);
    try {
      const sucsParam = esMaestro ? '' : misSucs.join('|');
      const res = await apiGet({
        action:'getDashboardPeriodo',
        fechaInicio,
        fechaFin,
        sucursales:sucsParam
      });
      let registrosPeriodo = [];
      if (res.success) {
        registrosPeriodo = res.registros || [];
      } else if (/Acci.n no reconocida|no reconocida/i.test(res.error || '')) {
        const consultas = [];
        for (let dia = 1; dia <= ultimoDia; dia++) {
          const fechaDia = `${String(dia).padStart(2,'0')}-${mes}-${anio}`;
          consultas.push(apiGet({ action:'getDashboard', fecha:fechaDia, sucursales:sucsParam }));
        }
        const respuestas = await Promise.all(consultas);
        registrosPeriodo = respuestas.flatMap(r => r.success ? (r.registros || []) : []);
      } else {
        throw new Error(res.error || 'No se pudo cargar el periodo.');
      }
      const sucsConPeriodo = [...new Set(registrosPeriodo.map(r=>r.sucursal))];
      const sucursalesPeriodo = esMaestro
        ? [...new Set([...sucsConPeriodo, ...SUCURSALES_ALL])].sort()
        : misSucs;
      descargarExcelGeneral(
        registrosPeriodo,
        `${fechaInicio} al ${fechaFin}`,
        `CONCENTRADO_MENSUAL_${mes}-${anio}.xlsx`,
        sucursalesPeriodo
      );
    } catch(e) {
      alert('Error al generar Excel mensual: ' + e.message);
    }
    setLoading(false);
  };

  // ── DETALLE ───────────────────────────────────────────────
  if (detalle) return (
    <div className="admin-screen slide-up">
      <div className="screen-header">
        <button className="header-back" onClick={()=>setDetalle(null)}>‹</button>
        <div>
          <div className="header-title">{shortSuc(detalle.sucursal)}</div>
          <div className="header-sub">{detalle.turno==='arqueo'?'Arqueo':'Cierre '+detalle.turno} · {detalle.fecha}</div>
        </div>
      </div>
      <div className="detalle-body">
        <div className="detalle-meta">
          <span>👤 Empleado: <strong>{detalle.empleado||'—'}</strong></span>
          <span>🕐 Hora: <strong>{detalle.hora||'—'}</strong></span>
          <span>📍 Estado: <strong>{detalle.estado||'—'}</strong></span>
        </div>

        <div className="section-label">Resumen financiero</div>
        {msgExito && <div className="msg msg-ok">{msgExito}</div>}
        {editCorte && (
          <div className="modal-sheet" style={{position:'static',transform:'none',maxWidth:'100%',boxShadow:'none'}}>
            {[
              ['ventasTotales','Ventas Totales'],
              ['tarjeta','Pago con Tarjeta'],
              ['sueldos','Sueldos'],
              ['gastos','Gastos'],
              ['extras','Extras'],
              ['faltante','Faltante'],
              ['sobrante','Sobrante'],
              ['pendiente','Pendiente de Depositar'],
              ['totalTickets','Total tickets'],
              ['ticketsCanceladosCorte','Tickets cancelados'],
            ].map(([k,l]) => (
              <div key={k} className="field">
                <div className="field-label">{l}</div>
                <input className="field-input" type="number" inputMode="decimal"
                  value={editCorte[k]} onChange={e=>setEditMonto(k,e.target.value)} />
              </div>
            ))}
            <div className="field">
              <div className="field-label">Efectivo contado automático</div>
              <input className="field-input" type="number" value={efectivoEditado} readOnly />
            </div>
            <div className="neto-card" style={{marginTop:'6px'}}>
              <div className="neto-left">Efectivo contado final</div>
              <div className="neto-valor">{fmtPeso(netoEditado)}</div>
            </div>
            <button className="btn btn-primary" onClick={guardarEdicionCorte}>Guardar modificación</button>
            <button className="btn btn-secondary" onClick={()=>setEditCorte(null)}>Cancelar</button>
          </div>
        )}
        {!editCorte && (
        <table className="detalle-fin-table">
          <tbody>
            {[
              ['Ventas Totales', detalle.ventasTotales],
              ['Pago con Tarjeta', detalle.tarjeta],
              ['Efectivo contado', detalle.efectivo],
              ['Sueldos',          detalle.sueldos],
              ['Gastos',           detalle.gastos],
              ['Extras',           detalle.extras],
            ].map(([l,v])=>(
              <tr key={l} className="detalle-fin-row">
                <td>{l}</td><td>{fmtPeso(parseFloat(v)||0)}</td>
              </tr>
            ))}
            {parseFloat(detalle.faltante)>0 && (
              <tr className="detalle-fin-row detalle-fin-alert">
                <td>⚠️ Faltante</td><td>{fmtPeso(parseFloat(detalle.faltante)||0)}</td>
              </tr>
            )}
            {parseFloat(detalle.sobrante)>0 && (
              <tr className="detalle-fin-row detalle-fin-ok">
                <td>✅ Sobrante</td><td>{fmtPeso(parseFloat(detalle.sobrante)||0)}</td>
              </tr>
            )}
            {parseFloat(detalle.pendiente)>0 && (
              <tr className="detalle-fin-row">
                <td>🕐 Pdte. Depositar</td><td>{fmtPeso(parseFloat(detalle.pendiente)||0)}</td>
              </tr>
            )}
            <tr className="detalle-fin-row detalle-fin-neto">
              <td>EFECTIVO CONTADO</td>
              <td style={{color:parseFloat(detalle.neto)<0?'var(--error)':'var(--accent)'}}>{fmtPeso(parseFloat(detalle.neto)||0)}</td>
            </tr>
          </tbody>
        </table>
        )}

        {esMaestro && !editCorte && (
          <button className="btn btn-primary" onClick={()=>abrirEditorCorte(detalle)}>
            Modificar corte
          </button>
        )}
        {esMaestro && !editCorte && detalle.estado !== 'DESBLOQUEADO' && (
          <button className="btn btn-secondary" onClick={()=>desbloquear(detalle)} style={{borderColor:'var(--error)',color:'var(--error)'}}>
            🔓 Desbloquear para empleado
          </button>
        )}
        {!editCorte && detalle.estado === 'DESBLOQUEADO' && (
          <div className="msg" style={{background:'var(--purple-dim)',border:'1px solid var(--purple)',color:'var(--purple)',textAlign:'center'}}>
            🔓 Este cierre ya fue desbloqueado
          </div>
        )}
      </div>
    </div>
  );

  // ── MODAL USUARIO ─────────────────────────────────────────
  const ModalUsuario = () => {
    const [form, setForm] = useS(modalUser.idx ? {...modalUser} : { usuario:'', password:'', sucursal:'', rol:'empleado', sucursalesAsignadas:'', nombre:'' });
    const setF = (k,v) => setForm(p=>({...p,[k]:v}));
    return (
      <div className="modal-overlay" onClick={()=>setModalUser(null)}>
        <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div className="modal-title">{modalUser.idx?'Editar usuario':'Nuevo usuario'}</div>
            <button className="modal-close" onClick={()=>setModalUser(null)}>✕</button>
          </div>
          {[
            ['nombre','Nombre','text'],['usuario','Usuario','text'],
            ['password',modalUser.idx?'Contraseña (dejar vacío = no cambiar)':'Contraseña','password'],
          ].map(([k,l,t])=>(
            <div key={k} className="field">
              <div className="field-label">{l}</div>
              <input className="field-input" type={t} value={form[k]||''}
                onChange={e=>setF(k,e.target.value)} placeholder={l} />
            </div>
          ))}
          <div className="field">
            <div className="field-label">Rol</div>
            <select className="field-input" value={form.rol} onChange={e=>setF('rol',e.target.value)}>
              <option value="empleado">Empleado</option>
              <option value="admin">Admin</option>
              <option value="maestro">Maestro</option>
            </select>
          </div>
          {form.rol==='empleado' && (
            <div className="field">
              <div className="field-label">Sucursal</div>
              <select className="field-input" value={form.sucursal} onChange={e=>setF('sucursal',e.target.value)}>
                <option value="">Selecciona...</option>
                {SUCURSALES_ALL.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          )}
          {form.rol==='admin' && (
            <div className="field">
              <div className="field-label">Sucursales asignadas (separadas por coma)</div>
              <textarea className="field-input" rows={3} value={form.sucursalesAsignadas||''}
                onChange={e=>setF('sucursalesAsignadas',e.target.value)}
                placeholder="JUAREZ 1 NEON FLY, SAN LUIS NEON FLY" />
            </div>
          )}
          <button className="btn btn-primary" onClick={()=>guardarUsuario(form)}>
            {modalUser.idx ? 'Guardar cambios' : 'Crear usuario'}
          </button>
        </div>
      </div>
    );
  };

  // ── RENDER PRINCIPAL ──────────────────────────────────────
  return (
    <div className="admin-screen">
      <IndicadorConexion />
      {/* Header */}
      <div className="home-header">
        <div>
          <div style={{fontSize:'10px',fontWeight:'700',letterSpacing:'.12em',textTransform:'uppercase',color:'var(--accent)',marginBottom:'3px'}}>
            {esMaestro ? '★ Usuario Maestro' : '● Administrador'}
          </div>
          <div className="home-nombre">{session.nombre||session.usuario}</div>
        </div>
        <button className="btn btn-ghost" onClick={onLogout}>Salir</button>
      </div>

      {/* Tabs */}
      <div className="admin-tabs">
        <button className={`admin-tab ${tab==='dashboard'?'active':''}`} onClick={()=>setTab('dashboard')}>📊 Dashboard</button>
        {esMaestro && <button className={`admin-tab ${tab==='usuarios'?'active':''}`} onClick={()=>setTab('usuarios')}>👥 Usuarios</button>}
      </div>

      {msgExito && <div className="msg msg-success" style={{margin:'12px 20px'}}>{msgExito}</div>}

      {/* ── TAB DASHBOARD ── */}
      {tab === 'dashboard' && (
        <>
          <div className="filtros-bar">
            <input className="filtro-input" type="date"
              value={fecha.split('-').reverse().join('-')}
              onChange={e=>{
                const [y,m,d]=e.target.value.split('-');
                setFecha(`${d}-${m}-${y}`);
              }} />
            <input className="filtro-input" placeholder="Buscar sucursal..."
              value={busqueda} onChange={e=>setBusqueda(e.target.value)} style={{maxWidth:'200px'}} />
            <button className="btn btn-primary" onClick={()=>descargarExcelGeneral()} style={{flex:'none',padding:'8px 14px'}}>
              Excel general
            </button>
            <input className="filtro-input" type="month"
              value={periodoMes}
              onChange={e=>setPeriodoMes(e.target.value)}
              style={{maxWidth:'150px'}} />
            <button className="btn btn-primary" onClick={descargarExcelMensual} style={{flex:'none',padding:'8px 14px'}}>
              Excel mensual
            </button>
            <button className="btn-ghost btn" onClick={cargarDashboard} style={{flex:'none',padding:'8px 14px'}}>↻ Actualizar</button>
          </div>

          {loading ? (
            <div className="loading-box"><div className="loading-spin">⏳</div><div style={{marginTop:'12px'}}>Cargando...</div></div>
          ) : (
            <div className="dash-grid">
              {sucsFiltradas.map(suc => {
                const c1 = getTurnoReg(suc,'1');
                const c2 = getTurnoReg(suc,'2');
                const aq = getTurnoReg(suc,'arqueo');
                if (!c1 && !c2 && !aq && !esMaestro) return null;
                return (
                  <div key={suc} className="dash-card">
                    <div className="dash-card-header">
                      <div>
                        <div className="dash-card-suc">{shortSuc(suc)}</div>
                        <div className="dash-card-fecha">{getBrand(suc)}</div>
                      </div>
                    </div>
                    <div className="dash-turnos">
                      {[['1','Cierre 1',c1],['2','Cierre 2',c2],['arqueo','Arqueo',aq]].map(([t,label,reg])=>(
                        reg ? (
                          <span key={t}
                            className={`dash-turno-pill ${reg.estado==='DESBLOQUEADO'?'dt-desbloqueado':'dt-enviado'}`}
                            style={{cursor:'pointer'}}
                            onClick={()=>setDetalle(reg)}>
                            {reg.estado==='DESBLOQUEADO'?'🔓':'✅'} {label} · {reg.empleado?.split(' ')[0]||'?'} · {reg.hora}
                          </span>
                        ) : (
                          <span key={t} className="dash-turno-pill dt-pendiente">⏳ {label}</span>
                        )
                      ))}
                    </div>
                  </div>
                );
              })}
              {sucsFiltradas.length===0 && <div className="empty-box">No hay sucursales que coincidan</div>}
            </div>
          )}
        </>
      )}

      {/* ── TAB USUARIOS (solo maestro) ── */}
      {tab === 'usuarios' && esMaestro && (
        <>
          <div style={{padding:'14px 20px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span style={{fontSize:'13px',color:'var(--text-dim)'}}>{users.length} usuarios</span>
            <button className="btn btn-primary" style={{width:'auto',padding:'8px 16px',fontSize:'13px'}} onClick={()=>setModalUser({})}>
              + Nuevo usuario
            </button>
          </div>
          {loading ? (
            <div className="loading-box"><div className="loading-spin">⏳</div></div>
          ) : (
            <div className="user-list">
              {users.map(u=>(
                <div key={u.idx} className="user-card" style={{opacity:u.activo?1:.5}}>
                  <div className="user-info">
                    <div className="user-nombre">{u.nombre||u.usuario}</div>
                    <div className="user-sub">
                      <span className={`role-badge ${u.rol==='maestro'?'role-maestro':'role-admin'}`} style={{fontSize:'9px',padding:'2px 8px',marginRight:'6px'}}>{u.rol}</span>
                      {u.sucursal||u.sucursalesAsignadas||'Sin sucursal'}
                    </div>
                  </div>
                  <div className="user-actions">
                    <button className="btn-user-action" onClick={()=>setModalUser(u)}>✏️</button>
                    <button className={`btn-user-action ${u.activo?'danger':''}`}
                      onClick={()=>toggleActivo(u)}>{u.activo?'🔒':'🔓'}</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {modalUser && <ModalUsuario />}
    </div>
  );
}


function App() {
  const [screen,      setScreen]      = useState('login');
  const [loginData,   setLoginData]   = useState(null);
  const [session,     setSession]     = useState(null);
  const [turnoActivo, setTurnoActivo] = useState(null);

  useEffect(() => {
    // Siempre inicia en login — sin restauración de sesión por seguridad
  }, []);

  const onLogin = (data) => {
    if ((data.rol || '').toLowerCase() === 'empleado') {
      setLoginData(data); setScreen('quien');
    } else { guardarSesion(data); }
  };

  const onQuienConfirm = (nombre) => guardarSesion({ ...loginData, nombre });

  const guardarSesion = async (data) => {
    const sess = { ...data, loginTime: new Date().toISOString() };
    // Si es empleado, verificar desbloqueos pendientes
    if ((data.rol||'').toLowerCase() === 'empleado' && data.sucursal) {
      try {
        const resp = await apiGet({ action:'checkDesbloqueos', sucursal:data.sucursal });
        if (resp.success && resp.desbloqueos?.length > 0) {
          resp.desbloqueos.forEach(d => {
            localStorage.removeItem(claveBloqueo(data.sucursal, d.turno));
          });
        }
      } catch(e) {}
    }
    setSession(sess); setScreen('home');
  };

  const onLogout = () => {
    if (!confirm('\u00bfSeguro que quieres cerrar sesi\u00f3n?')) return;
    localStorage.removeItem(SESSION_KEY);
    setSession(null); setLoginData(null); setTurnoActivo(null); setScreen('login');
  };

  const iniciarCierre = (turno) => { setTurnoActivo(turno); setScreen('cierre'); };
  const volverAlHome  = ()      => { setTurnoActivo(null);  setScreen('home');   };

  if (screen === 'login')  return <React.Fragment><IndicadorConexion /><LoginScreen onLogin={onLogin} /></React.Fragment>;

  if (screen === 'quien' && loginData)
    return <QuienEresScreenMejorada loginData={loginData} onConfirm={onQuienConfirm}
             onBack={() => { setLoginData(null); setScreen('login'); }} />;

  if (screen === 'cierre' && session && turnoActivo)
    return <React.Fragment><IndicadorConexion /><FlujoCierre session={session} turno={turnoActivo}
             onVolver={volverAlHome} onCompletado={volverAlHome} /></React.Fragment>;

  if (screen === 'home' && session)
    return (session.rol || '').toLowerCase() === 'empleado'
      ? <React.Fragment><IndicadorConexion /><HomeEmpleado session={session} onLogout={onLogout} onIniciarCierre={iniciarCierre} /></React.Fragment>
      : <React.Fragment><IndicadorConexion /><HomeAdmin    session={session} onLogout={onLogout} /></React.Fragment>;

  return null;
}

// ── Render root
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
