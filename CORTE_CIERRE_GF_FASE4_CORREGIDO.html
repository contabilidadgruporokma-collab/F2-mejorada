  <style>
    /* ═══════════════════════════════════════ VARIABLES ══════════════════════════════════════ */
    :root {
      --bg:           #2A2A2A;
      --surface:      #333333;
      --surface2:     #3D3D3D;
      --surface3:     #474747;
      --border:       #555555;
      --accent:       #F97316;
      --accent-light: #FB923C;
      --accent-dim:   rgba(249,115,22,0.12);
      --text:         #F0EDE8;
      --text-dim:     #888;
      --text-muted:   #484848;
      --success:      #22C55E;
      --success-dim:  rgba(34,197,94,0.12);
      --error:        #EF4444;
      --error-dim:    rgba(239,68,68,0.12);
      --warning:      #F59E0B;
      --warn-dim:     rgba(245,158,11,0.12);
      --purple:       #A78BFA;
      --purple-dim:   rgba(167,139,250,0.12);
      --r:            12px;
      --r-sm:         8px;
      --r-lg:         20px;
      --t:            0.2s ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }





    /* Fondos de pantalla por marca — color + marca de agua */
    .fondo-laberinttos {
      background: linear-gradient(160deg, #1a0d12 0%, #150d1a 50%, #0d1219 100%) !important;
      position: relative;
    }
    .fondo-neon-fly {
      background: linear-gradient(160deg, #0d1a0d 0%, #0a1a0e 50%, #0d1a10 100%) !important;
      position: relative;
    }
    .fondo-brinkos {
      background: linear-gradient(160deg, #1a1200 0%, #1a1500 50%, #1a1800 100%) !important;
      position: relative;
    }
    /* Marca de agua como pseudo-elemento */
    .fondo-laberinttos::before,
    .fondo-neon-fly::before,
    .fondo-brinkos::before {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85vw;
      max-width: 380px;
      height: 85vw;
      max-height: 380px;
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.06;
      pointer-events: none;
      z-index: 0;
    }

    /* Asegurar que el contenido quede encima */
    .fondo-laberinttos > *,
    .fondo-neon-fly > *,
    .fondo-brinkos > * {
      position: relative;
      z-index: 1;
    }

    /* Colores por marca */
    .marca-pill { display:inline-flex; align-items:center; padding:4px 12px; border-radius:100px; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; }
    .marca-laberinttos { background:linear-gradient(135deg,#FF6B9D,#FF4757,#FFA502,#2ED573,#1E90FF,#A855F7); color:#fff; }
    .marca-neon-fly    { background:linear-gradient(135deg,#ADFF2F,#39FF14); color:#1a1a1a; }
    .marca-brinkos     { background:linear-gradient(135deg,#F59E0B,#D97706); color:#fff; }
    .marca-default     { background:var(--accent); color:#fff; }

    /* Indicador conexión */
    .conexion-banner {
      position:fixed; top:0; left:0; right:0; z-index:999;
      background:var(--error); color:#fff;
      padding:10px 16px; text-align:center;
      font-size:13px; font-weight:600;
      animation:slideDown .3s ease;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    @keyframes slideDown { from{transform:translateY(-100%)} to{transform:translateY(0)} }
    .conexion-dot { width:8px; height:8px; border-radius:50%; background:#fff; animation:pulse 1.2s ease infinite; }

    /* Logo marca en header */
    .header-logo { height:28px; width:auto; object-fit:contain; max-width:110px; background:var(--surface3); border-radius:6px; padding:2px 6px; }
    .home-logo   { height:44px; width:auto; object-fit:contain; max-width:160px; margin-bottom:6px; background:var(--surface3); border-radius:8px; padding:4px 8px; }



    /* ══════════════════════ PANEL ADMIN ══════════════════════ */
    .admin-screen { min-height:100vh; display:flex; flex-direction:column; background:var(--bg); }

    /* Tabs */
    .admin-tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); overflow-x:auto; }
    .admin-tab  {
      flex-shrink:0; padding:14px 20px; font-size:13px; font-weight:600;
      color:var(--text-dim); border:none; background:none; cursor:pointer;
      border-bottom:2px solid transparent; font-family:'DM Sans',sans-serif;
      transition:all var(--t); white-space:nowrap;
    }
    .admin-tab.active { color:var(--accent); border-bottom-color:var(--accent); }

    /* Dashboard cards */
    .dash-grid { display:flex; flex-direction:column; gap:12px; padding:20px; max-width:600px; margin:0 auto; width:100%; }

    .dash-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:16px; cursor:pointer;
      transition:all var(--t); box-shadow:0 1px 3px rgba(0,0,0,.3);
    }
    .dash-card:hover { border-color:var(--accent); }
    .dash-card-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .dash-card-suc { font-size:14px; font-weight:700; }
    .dash-card-fecha { font-size:11px; color:var(--text-muted); }
    .dash-turnos { display:flex; gap:8px; flex-wrap:wrap; }
    .dash-turno-pill {
      display:inline-flex; align-items:center; gap:5px;
      padding:4px 10px; border-radius:100px; font-size:11px; font-weight:600;
    }
    .dt-enviado    { background:var(--success-dim); color:var(--success); }
    .dt-pendiente  { background:var(--warn-dim);    color:var(--warning); }
    .dt-desbloqueado { background:var(--purple-dim); color:var(--purple); }

    /* Detalle cierre */
    .detalle-body { padding:20px; max-width:600px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:16px; }
    .detalle-meta { font-size:13px; color:var(--text-dim); display:flex; flex-direction:column; gap:4px; }
    .detalle-meta strong { color:var(--text); }

    .detalle-fin-table { width:100%; border-collapse:collapse; }
    .detalle-fin-row td { padding:8px 0; font-size:13px; border-bottom:1px solid var(--border); }
    .detalle-fin-row td:first-child { color:var(--text-dim); }
    .detalle-fin-row td:last-child  { text-align:right; font-weight:600; }
    .detalle-fin-neto td { font-size:15px; font-weight:700; color:var(--accent); border:none; padding-top:12px; }
    .detalle-fin-alert td { color:var(--error) !important; }
    .detalle-fin-ok td    { color:var(--success) !important; }

    /* Filtros */
    .filtros-bar { display:flex; gap:10px; padding:14px 20px; background:var(--surface); border-bottom:1px solid var(--border); flex-wrap:wrap; align-items:center; }
    .filtro-input {
      background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm);
      padding:8px 12px; font-size:13px; color:var(--text); font-family:'DM Sans',sans-serif;
      outline:none; flex:1; min-width:120px;
    }
    .filtro-input:focus { border-color:var(--accent); }

    /* Usuarios */
    .user-list { display:flex; flex-direction:column; gap:10px; padding:20px; max-width:600px; margin:0 auto; width:100%; }
    .user-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
      padding:14px 16px; display:flex; align-items:center; gap:12px;
    }
    .user-info  { flex:1; }
    .user-nombre { font-size:14px; font-weight:600; }
    .user-sub   { font-size:12px; color:var(--text-dim); margin-top:2px; }
    .user-actions { display:flex; gap:8px; }
    .btn-user-action {
      background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm);
      padding:6px 12px; font-size:11px; font-weight:600; color:var(--text-dim);
      cursor:pointer; font-family:'DM Sans',sans-serif; transition:all var(--t);
    }
    .btn-user-action:hover { border-color:var(--accent); color:var(--accent); }
    .btn-user-action.danger:hover { border-color:var(--error); color:var(--error); }

    /* Modal usuario */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100;
      display:flex; align-items:flex-end; justify-content:center;
    }
    .modal-sheet {
      background:var(--surface); border-radius:var(--r-lg) var(--r-lg) 0 0;
      padding:24px 20px 40px; width:100%; max-width:500px;
      display:flex; flex-direction:column; gap:14px;
      animation:slideUp .3s cubic-bezier(.16,1,.3,1);
    }
    .modal-title { font-size:18px; font-weight:700; }
    .modal-close { background:none; border:none; cursor:pointer; color:var(--text-dim); font-size:22px; line-height:1; }

    /* Loading */
    .loading-box { text-align:center; padding:60px 20px; color:var(--text-dim); }
    .loading-spin { font-size:32px; display:inline-block; animation:spin .8s linear infinite; }
    .empty-box { text-align:center; padding:60px 20px; color:var(--text-muted); font-size:14px; }

    /* ══════════════════════ COMPROBANTE ══════════════════════ */
    .comprobante-screen {
      min-height:100vh; background:#fff; color:#1a1a1a;
      display:flex; flex-direction:column;
    }
    .comprobante-header-bar {
      background:#1a1a1a; padding:14px 20px;
      display:flex; align-items:center; justify-content:space-between;
    }
    .comprobante-header-bar-title { color:#fff; font-size:13px; font-weight:600; }
    .comprobante-btn-captura {
      background:var(--accent); color:#fff; border:none; border-radius:var(--r-sm);
      padding:8px 16px; font-size:12px; font-weight:700; cursor:pointer;
      font-family:'DM Sans',sans-serif; -webkit-tap-highlight-color:transparent;
    }

    .comprobante-body { padding:24px 20px 40px; max-width:480px; margin:0 auto; width:100%; }

    /* Cabecera del comprobante */
    .comp-top { text-align:center; padding-bottom:20px; border-bottom:2px solid #1a1a1a; margin-bottom:20px; }
    .comp-logo { height:50px; width:auto; object-fit:contain; max-width:180px; margin-bottom:12px; }
    .comp-sucursal { font-family:'Bebas Neue',sans-serif; font-size:28px; line-height:1; color:#1a1a1a; }
    .comp-fecha { font-size:12px; color:#666; margin-top:4px; }
    .comp-empleado { margin-top:8px; font-size:13px; font-weight:600; color:#1a1a1a; }
    .comp-turno-badge {
      display:inline-flex; align-items:center; gap:6px;
      background:#1a1a1a; color:#fff; border-radius:100px;
      padding:4px 14px; font-size:11px; font-weight:700;
      letter-spacing:.1em; text-transform:uppercase; margin-top:8px;
    }

    /* Sello ENVIADO */
    .comp-sello-wrap { display:flex; justify-content:center; margin:20px 0; }
    .comp-sello {
      border:3px solid #16a34a; border-radius:12px;
      padding:10px 28px; text-align:center; position:relative;
      transform:rotate(-3deg);
    }
    .comp-sello-txt { font-family:'Bebas Neue',sans-serif; font-size:42px; color:#16a34a; line-height:1; letter-spacing:.08em; }
    .comp-sello-sub { font-size:10px; color:#16a34a; font-weight:700; letter-spacing:.15em; }

    /* Secciones */
    .comp-section-title {
      font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase;
      color:#666; margin-bottom:8px; margin-top:18px; padding-bottom:4px;
      border-bottom:1px solid #e0e0e0;
    }

    /* Tabla financiera */
    .comp-fin-table { width:100%; border-collapse:collapse; }
    .comp-fin-row td { padding:6px 0; font-size:13px; border-bottom:1px solid #f0f0f0; }
    .comp-fin-row td:first-child { color:#555; }
    .comp-fin-row td:last-child { text-align:right; font-weight:600; color:#1a1a1a; }
    .comp-fin-neto td { padding-top:10px !important; border-bottom:none !important; }
    .comp-fin-neto td:first-child { font-weight:700; font-size:14px; color:#1a1a1a; }
    .comp-fin-neto td:last-child { font-size:20px; font-weight:700; color:var(--accent); }
    .comp-fin-alert td:first-child { color:#dc2626 !important; }
    .comp-fin-alert td:last-child  { color:#dc2626 !important; }
    .comp-fin-success td:first-child { color:#16a34a !important; }
    .comp-fin-success td:last-child  { color:#16a34a !important; }

    /* Tabla evidencias */
    .comp-ev-table { width:100%; border-collapse:collapse; }
    .comp-ev-row td { padding:6px 4px; font-size:12px; border-bottom:1px solid #f0f0f0; vertical-align:middle; }
    .comp-ev-row td:first-child { width:20px; }
    .comp-ev-row td:nth-child(2) { color:#1a1a1a; flex:1; }
    .comp-ev-row td:last-child   { text-align:right; color:#888; font-size:11px; white-space:nowrap; }
    .comp-ev-omitida td:nth-child(2) { color:#bbb; }

    /* Footer */
    .comp-footer { margin-top:24px; text-align:center; }
    .comp-footer-line { font-size:10px; color:#bbb; }
    .comp-qr-placeholder {
      width:60px; height:60px; border:2px solid #e0e0e0; border-radius:8px;
      display:flex; align-items:center; justify-content:center;
      margin:10px auto; font-size:24px; color:#ccc;
    }

    /* Tip captura */
    .comp-tip {
      background:#fff8f0; border:1px solid #f97316; border-radius:var(--r-sm);
      padding:10px 14px; font-size:12px; color:#c2410c; margin-bottom:16px;
      text-align:center;
    }

    /* ══════════════════════ MEJORAS V2 ══════════════════════ */


    /* Forzar texto blanco en tema oscuro */
    .greeting-title, .greeting-date, .greeting-label,
    .home-nombre, .home-brand,
    .ac-title, .ac-sub,
    .section-label,
    .status-card-label,
    .header-title, .header-sub,
    .paso-titulo, .paso-inst, .paso-num,
    .intro-turno, .intro-meta,
    .intro-item-txt, .intro-item-badge,
    .montos-title, .montos-sub,
    .monto-label, .ev-campo-label,
    .reporte-card-title, .reporte-card-meta,
    .resumen-fin-label, .resumen-fin-valor,
    .exito-titulo, .exito-sub, .exito-suc,
    .neto-left,
    .ev-label,
    .phase-title, .phase-sub {
      color: var(--text) !important;
    }
    .greeting-date, .header-sub, .ac-sub,
    .intro-meta, .intro-item-badge,
    .paso-inst, .montos-sub, .phase-sub,
    .reporte-card-meta { color: var(--text-dim) !important; }
    .greeting-label, .section-label, .status-card-label,
    .monto-label, .ev-campo-label, .paso-num { color: var(--text-muted) !important; }

    /* Sombras */
    .status-card, .action-card, .intro-item, .neto-card, .ev-row {
      box-shadow: 0 1px 3px rgba(0,0,0,.3);
    }
    .screen-header { box-shadow: 0 1px 4px rgba(0,0,0,.4); }

    /* Importe + comentario por evidencia */
    .ev-campos { display:flex; flex-direction:column; gap:10px; margin-top:4px; }
    .ev-campo-label { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); }
    .ev-campo-label, .monto-label { color:#fff !important; }
    .ev-importe-wrap { position:relative; }
    .ev-peso { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:14px; pointer-events:none; }
    .ev-importe { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px 12px 28px; font-size:15px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; width:100%; -webkit-appearance:none; transition:border-color var(--t); }
    .ev-importe:focus { border-color:var(--accent); background:var(--surface); }
    .ev-comentario { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; width:100%; resize:none; min-height:72px; transition:border-color var(--t); }
    .ev-comentario:focus { border-color:var(--accent); background:var(--surface); }
    .ev-select { background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; width:100%; transition:border-color var(--t); }
    .ev-select:focus { border-color:var(--accent); background:var(--surface); }
    .ev-gasto-row { display:grid; grid-template-columns:1fr 120px 34px; gap:8px; align-items:center; }
    .ev-gasto-del { height:42px; border:1px solid var(--border); background:var(--surface2); color:var(--error); border-radius:var(--r-sm); font-weight:700; cursor:pointer; }
    .ev-instruccion-top { background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:var(--r-sm); padding:12px 14px; color:var(--text); font-size:13px; line-height:1.35; }

    /* Multi-foto grid */
    .fotos-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .foto-thumb-wrap { position:relative; border-radius:var(--r-sm); overflow:hidden; aspect-ratio:1; background:var(--surface2); }
    .foto-thumb { width:100%; height:100%; object-fit:cover; display:block; }
    .foto-del { position:absolute; top:4px; right:4px; background:rgba(220,38,38,.85); color:#fff; border:none; border-radius:50%; width:22px; height:22px; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; line-height:1; }
    .fotos-add-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
    .btn-foto-add { background:var(--surface2); border:1.5px dashed var(--border); border-radius:var(--r-sm); padding:14px 10px; text-align:center; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text-dim); transition:all var(--t); -webkit-tap-highlight-color:transparent; }
    .btn-foto-add:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
    .btn-foto-add .bfa-icon { font-size:22px; display:block; margin-bottom:4px; }

    /* Reporte evidencias */
    .reporte-section { display:flex; flex-direction:column; gap:8px; }
    .reporte-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
    .reporte-card-header { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
    .reporte-card-icon { font-size:16px; }
    .reporte-card-title { font-size:13px; font-weight:600; flex:1; }
    .reporte-card-status { font-size:11px; font-weight:600; }
    .reporte-card-status.listo   { color:var(--success); }
    .reporte-card-status.omitida { color:var(--text-muted); }
    .reporte-card-meta { font-size:12px; color:var(--text-dim); display:flex; flex-direction:column; gap:3px; }
    .reporte-card-fotos { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .reporte-foto-mini { width:56px; height:56px; object-fit:cover; border-radius:var(--r-sm); border:1px solid var(--border); cursor:pointer; }

    /* Resumen financiero */
    .resumen-financiero { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); overflow:hidden; }
    .resumen-fin-row { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border); font-size:13px; }
    .resumen-fin-row:last-child { border-bottom:none; }
    .resumen-fin-label { color:var(--text-dim); }
    .resumen-fin-valor { font-weight:600; }
    .resumen-fin-neto  { background:var(--accent-dim); }
    .resumen-fin-neto .resumen-fin-label { color:var(--accent); font-weight:700; font-size:14px; }
    .resumen-fin-neto .resumen-fin-valor { color:var(--accent); font-size:18px; font-weight:700; }
    .resumen-fin-alert { color:var(--error) !important; }
    .ticket-tiempo-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:8px; }
    .ticket-tiempo-grid .ev-importe { padding-left:14px; min-width:0; text-align:center; }
    @media (max-width:640px) {
      .ticket-tiempo-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
    }

    /* Foto ampliada modal */
    .foto-modal { position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:999; display:flex; align-items:center; justify-content:center; padding:20px; }
    .foto-modal img { max-width:100%; max-height:90vh; border-radius:var(--r); object-fit:contain; }
    .foto-modal-close { position:absolute; top:16px; right:16px; background:rgba(255,255,255,.15); border:none; color:#fff; font-size:22px; width:40px; height:40px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    /* Botón editar en resumen */
    .btn-editar-ev { background:none; border:1px solid var(--border); border-radius:var(--r-sm); padding:5px 12px; font-size:11px; font-weight:600; color:var(--text-dim); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all var(--t); }
    .btn-editar-ev:hover { border-color:var(--accent); color:var(--accent); }

    /* Badge arqueo */
    .badge-arqueo { background:rgba(22,163,74,.12); color:var(--success); }

    /* ═══════════════════════════════════════ UTILS ══════════════════════════════════════════ */
    .fade-in  { animation: fadeIn  0.30s ease; }
    .slide-up { animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1); }

    @keyframes fadeIn  { from { opacity:0; transform:translateY(8px) }  to { opacity:1; transform:none } }
    @keyframes slideUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:none } }

    @keyframes spin  { to { transform:rotate(360deg) } }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

    .spinner {
      display:inline-block; width:18px; height:18px;
      border:2px solid rgba(255,255,255,.25); border-top-color:#fff;
      border-radius:50%; animation:spin .7s linear infinite;
      vertical-align:middle; margin-right:8px;
    }

    /* ═══════════════════════════════════════ BOTONES ════════════════════════════════════════ */
    .btn {
      font-family:'DM Sans',sans-serif; cursor:pointer; width:100%;
      border-radius:var(--r-sm); padding:17px 24px; font-size:15px; font-weight:600;
      border:none; transition:all var(--t); -webkit-tap-highlight-color:transparent;
    }
    .btn:active   { transform:scale(0.98); }
    .btn:disabled { opacity:.45; cursor:not-allowed; transform:none; }

    .btn-primary  { background:var(--accent); color:#fff; }
    .btn-primary:hover:not(:disabled) { background:var(--accent-light); }

    .btn-secondary {
      background:var(--surface2); color:var(--text);
      border:1px solid var(--border); font-weight:500;
    }
    .btn-secondary:hover:not(:disabled) { background:var(--surface3); }

    .btn-ghost {
      background:none; color:var(--text-dim);
      border:1px solid var(--border); width:auto; padding:8px 14px;
      font-size:12px; font-weight:500;
    }
    .btn-ghost:hover { border-color:var(--error); color:var(--error); }

    .btn-icon {
      width:44px; height:44px; padding:0; border-radius:var(--r-sm);
      display:flex; align-items:center; justify-content:center;
      background:transparent; border:none; color:var(--text-dim);
      cursor:pointer; font-size:18px; transition:background var(--t), color var(--t);
      -webkit-tap-highlight-color:transparent;
    }
    .btn-icon:hover { background:var(--surface2); color:var(--text); }

    .eye-icon {
      position:relative; width:23px; height:14px; display:inline-block;
      border:2px solid currentColor; border-radius:50%;
    }
    .eye-icon::before {
      content:""; position:absolute; width:6px; height:6px;
      left:50%; top:50%; transform:translate(-50%,-50%);
      background:currentColor; border-radius:50%;
    }
    .eye-icon::after {
      content:""; position:absolute; left:-3px; right:-3px; top:-4px; height:0;
      background:var(--surface); border-bottom:2px solid currentColor;
      border-radius:0 0 999px 999px; opacity:0; transform-origin:top;
    }
    .eye-icon.blinking::after { animation:eyeBlink 1.35s ease-in-out infinite; }
    @keyframes eyeBlink {
      0%, 38%, 58%, 100% { height:0; opacity:0; }
      46%, 50% { height:20px; opacity:1; }
    }

    /* ═══════════════════════════════════════ INPUTS ═════════════════════════════════════════ */
    .field { display:flex; flex-direction:column; gap:8px; }

    .field-label {
      font-size:11px; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--text-dim);
    }

    .field-input {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r-sm); padding:16px 18px;
      font-size:16px; font-family:'DM Sans',sans-serif; color:var(--text);
      outline:none; width:100%; transition:border-color var(--t), background var(--t);
      -webkit-appearance:none;
    }
    .field-input::placeholder { color:var(--text-muted); }
    .field-input:focus    { border-color:var(--accent); background:var(--surface2); }
    .field-input.has-error { border-color:var(--error); }

    /* ═══════════════════════════════════════ MENSAJES ═══════════════════════════════════════ */
    .msg {
      border-radius:var(--r-sm); padding:12px 16px;
      font-size:13px; line-height:1.5; text-align:center;
    }
    .msg-error   { background:var(--error-dim);   border:1px solid rgba(239,68,68,.3);   color:var(--error); }
    .msg-success { background:var(--success-dim); border:1px solid rgba(34,197,94,.3);  color:var(--success); }
    .msg-warn    { background:var(--warn-dim);    border:1px solid rgba(245,158,11,.3); color:var(--warning); }

    /* ═══════════════════════════════════════ HEADER DE PANTALLA ═════════════════════════════ */
    .screen-header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:14px 18px; display:flex; align-items:center; gap:12px;
      position:sticky; top:0; z-index:10;
    }
    .header-back {
      width:36px; height:36px; background:var(--surface2); border:1px solid var(--border);
      border-radius:var(--r-sm); display:flex; align-items:center; justify-content:center;
      cursor:pointer; flex-shrink:0; color:var(--text-dim); font-size:20px;
      -webkit-tap-highlight-color:transparent; transition:background var(--t);
    }
    .header-back:hover { background:var(--surface3); }

    .header-title { font-size:15px; font-weight:600; color:var(--text); }
    .header-sub   { font-size:12px; color:var(--text-dim); margin-top:1px; }

    /* ═══════════════════════════════════════ LOGIN ══════════════════════════════════════════ */
    .login-screen {
      min-height:100vh; display:flex; flex-direction:column;
      position:relative; overflow:hidden;
    }

    .login-bg {
      position:absolute; inset:0; z-index:0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -10%, rgba(249,115,22,.18) 0%, transparent 65%),
        radial-gradient(ellipse 55% 40% at 90% 110%,  rgba(249,115,22,.08) 0%, transparent 55%),
        var(--bg);
    }
    .login-grid {
      position:absolute; inset:0; z-index:0;
      background-image:
        linear-gradient(rgba(249,115,22,.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,.045) 1px, transparent 1px);
      background-size:44px 44px;
    }

    .login-content {
      position:relative; z-index:1; flex:1;
      display:flex; flex-direction:column; justify-content:center;
      padding:40px 26px; max-width:420px; margin:0 auto; width:100%;
    }

    .login-badge {
      display:inline-flex; align-items:center; gap:9px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:100px; padding:9px 18px; margin-bottom:22px;
    }
    .login-badge-dot {
      width:7px; height:7px; background:var(--accent);
      border-radius:50%; animation:pulse 2.5s ease-in-out infinite;
    }
    .login-badge-text {
      font-size:11px; font-weight:600; letter-spacing:.15em;
      text-transform:uppercase; color:var(--text-dim);
    }

    .login-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(54px,13vw,76px); line-height:.93; letter-spacing:.02em;
    }
    .login-title span { color:var(--accent); }
    .login-subtitle { margin-top:11px; font-size:14px; color:var(--text-dim); font-weight:300; }

    .login-form { margin-top:38px; display:flex; flex-direction:column; gap:16px; }

    .app-version {
      margin-top:18px; text-align:center; font-size:11px; color:var(--text-muted);
      letter-spacing:.08em; text-transform:uppercase;
    }

    /* ═══════════════════════════════════════ QUIEN ERES ═════════════════════════════════════ */
    .quien-screen { min-height:100vh; display:flex; flex-direction:column; }

    .quien-body { flex:1; padding:32px 24px; max-width:420px; margin:0 auto; width:100%; }

    .quien-title {
      font-family:'Bebas Neue',sans-serif; font-size:44px;
      line-height:.95; margin-bottom:10px;
    }
    .quien-desc { font-size:14px; color:var(--text-dim); line-height:1.65; margin-bottom:30px; }

    /* ═══════════════════════════════════════ HOME ═══════════════════════════════════════════ */
    .home-screen { min-height:100vh; display:flex; flex-direction:column; }

    .home-header {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:15px 20px; display:flex; align-items:center; justify-content:space-between;
    }
    .home-brand {
      font-size:10px; font-weight:700; letter-spacing:.14em;
      text-transform:uppercase; color:var(--accent); margin-bottom:3px;
    }
    .home-nombre { font-size:16px; font-weight:600; }

    .home-body {
      flex:1; padding:22px 20px 40px;
      max-width:500px; margin:0 auto; width:100%;
      display:flex; flex-direction:column; gap:24px;
    }

    /* Saludo */
    .greeting-label {
      font-size:11px; font-weight:600; letter-spacing:.12em;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:4px;
    }
    .greeting-title {
      font-family:'Bebas Neue',sans-serif; font-size:38px; line-height:1;
    }
    .greeting-date { margin-top:5px; font-size:13px; color:var(--text-dim); }

    /* Status del día */
    .status-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    .status-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:15px;
    }
    .status-card-label {
      font-size:11px; font-weight:600; letter-spacing:.1em;
      text-transform:uppercase; color:var(--text-muted); margin-bottom:9px;
    }
    .status-pill {
      display:inline-flex; align-items:center; gap:6px;
      font-size:11px; font-weight:600; padding:4px 10px;
      border-radius:100px;
    }
    .status-pill.pendiente { background:var(--warn-dim);    color:var(--warning); }
    .status-pill.listo     { background:var(--success-dim); color:var(--success); }
    .status-pill.vacio     { background:var(--surface2);    color:var(--text-muted); }

    .status-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

    /* Section title */
    .section-label {
      font-size:11px; font-weight:600; letter-spacing:.14em;
      text-transform:uppercase; color:var(--text-muted);
    }

    /* Tarjetas de acción */
    .action-list { display:flex; flex-direction:column; gap:10px; }

    .action-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--r); padding:18px; display:flex; align-items:center;
      gap:15px; cursor:pointer; transition:all var(--t);
      -webkit-tap-highlight-color:transparent; text-align:left; width:100%;
    }
    .action-card:hover  { border-color:var(--accent); background:var(--surface2); }
    .action-card:active { transform:scale(0.98); }
    .action-card.disabled { opacity:.45; cursor:not-allowed; }
    .action-card.disabled:hover { border-color:var(--border); background:var(--surface); transform:none; }
    .action-card.done { border-color:rgba(34,197,94,.3); }
    .action-card.done:hover { border-color:var(--success); }

    .ac-icon {
      width:46px; height:46px; background:var(--accent-dim);
      border-radius:var(--r-sm); display:flex; align-items:center;
      justify-content:center; font-size:21px; flex-shrink:0;
    }
    .action-card.done .ac-icon { background:var(--success-dim); }

    .ac-info  { flex:1; }
    .ac-title { font-size:15px; font-weight:600; margin-bottom:3px; }
    .ac-sub   { font-size:13px; color:var(--text-dim); }
    .ac-arrow { color:var(--text-muted); font-size:20px; flex-shrink:0; }

    /* Placeholder de fase */
    .phase-box {
      background:var(--surface); border:1px dashed var(--border);
      border-radius:var(--r); padding:28px 22px; text-align:center;
    }
    .phase-icon  { font-size:28px; margin-bottom:10px; }
    .phase-title { font-size:14px; font-weight:600; color:var(--text-dim); margin-bottom:5px; }
    .phase-sub   { font-size:12px; color:var(--text-muted); line-height:1.6; }

    /* Admin */
    .role-badge {
      display:inline-flex; align-items:center; gap:6px;
      border-radius:100px; padding:4px 12px;
      font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    }
    .role-admin  { background:var(--purple-dim); color:var(--purple); }
    .role-maestro{ background:var(--accent-dim); color:var(--accent); }

    .suc-chips   { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
    .suc-chip    {
      background:var(--surface2); border:1px solid var(--border);
      border-radius:100px; padding:5px 13px; font-size:12px;
      color:var(--text-dim); font-weight:500;
    }

    /* Responsive ajustes */
    @media (max-height:680px) {
      .login-content  { padding:22px 26px; }
      .login-badge    { margin-bottom:16px; }
      .login-form     { margin-top:22px; gap:12px; }
    }

    /* ═══════════════════════════ FASE 2 — FLUJO CIERRE ═════════════════════════════ */

    /* Barra de progreso */
    .prog-wrap { background:var(--surface2); border-radius:100px; height:3px; width:100%; margin-bottom:6px; }
    .prog-fill  { background:var(--accent); height:3px; border-radius:100px; transition:width .4s ease; }
    .prog-label { font-size:11px; color:var(--text-muted); display:flex; justify-content:space-between; margin-bottom:16px; }

    /* Header de paso */
    .paso-wrap  { padding:20px 20px 32px; max-width:500px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:20px; }
    .paso-badge { display:inline-flex; align-items:center; gap:6px; font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:4px 10px; border-radius:100px; }
    .badge-oblig { background:var(--accent-dim); color:var(--accent); }
    .badge-opcl  { background:var(--purple-dim); color:var(--purple); }
    .paso-num   { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:.1em; }
    .paso-titulo { font-family:'Bebas Neue',sans-serif; font-size:40px; line-height:1; margin-top:2px; }
    .paso-inst  { font-size:14px; color:var(--text-dim); line-height:1.65; }

    /* Zona de cámara */
    .camara-zone {
      border:2px dashed var(--border); border-radius:var(--r-lg);
      padding:44px 20px; text-align:center; background:var(--surface);
      cursor:pointer; transition:border-color var(--t), background var(--t);
      -webkit-tap-highlight-color:transparent;
    }
    .camara-zone:hover  { border-color:var(--accent); background:var(--surface2); }
    .camara-zone:active { transform:scale(0.98); }
    .camara-icon  { font-size:52px; margin-bottom:10px; line-height:1; }
    .camara-label { font-size:15px; font-weight:600; }
    .camara-sub   { font-size:12px; color:var(--text-dim); margin-top:4px; }

    /* Preview foto */
    .preview-wrap  { position:relative; border-radius:var(--r); overflow:hidden; background:var(--surface2); }
    .preview-img   { width:100%; max-height:280px; object-fit:cover; display:block; }
    .preview-badge { position:absolute; top:10px; right:10px; background:rgba(0,0,0,.75); color:#fff; font-size:11px; font-weight:600; padding:4px 12px; border-radius:100px; }
    .preview-btns  { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

    /* Subiendo */
    .subiendo-box { text-align:center; padding:40px 20px; }
    .subiendo-icon { font-size:40px; margin-bottom:14px; animation:spin 1s linear infinite; display:inline-block; }
    .subiendo-txt  { font-size:15px; font-weight:600; margin-bottom:6px; }
    .subiendo-sub  { font-size:13px; color:var(--text-dim); }

    /* Pregunta SI/NO */
    .pregunta-titulo { font-size:18px; font-weight:600; line-height:1.4; text-align:center; margin-bottom:24px; }
    .pregunta-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .pq-btn {
      background:var(--surface); border:2px solid var(--border);
      border-radius:var(--r); padding:24px 16px; text-align:center;
      cursor:pointer; transition:all var(--t); font-family:'DM Sans',sans-serif;
      -webkit-tap-highlight-color:transparent;
    }
    .pq-btn:active { transform:scale(0.97); }
    .pq-btn.si { border-color:var(--success); background:var(--success-dim); }
    .pq-btn.no { border-color:var(--border); }
    .pq-btn.no:hover { border-color:var(--text-muted); }
    .pq-icon  { font-size:32px; margin-bottom:8px; }
    .pq-label { font-size:15px; font-weight:600; }
    .pq-sub   { font-size:12px; color:var(--text-dim); margin-top:3px; }

    /* Montos */
    .montos-title { font-family:'Bebas Neue',sans-serif; font-size:36px; line-height:1; }
    .montos-sub   { font-size:13px; color:var(--text-dim); margin-top:4px; margin-bottom:4px; }
    .monto-group  { display:flex; flex-direction:column; gap:12px; }
    .monto-field  { display:flex; flex-direction:column; gap:6px; }
    .monto-label  { font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); }
    .monto-input  {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm);
      padding:14px 16px 14px 28px; font-size:17px; font-family:'DM Sans',sans-serif;
      color:var(--text); outline:none; width:100%; -webkit-appearance:none;
      transition:border-color var(--t);
    }
    .monto-input:focus { border-color:var(--accent); }
    .monto-wrap { position:relative; }
    .monto-peso { position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:15px; font-weight:500; pointer-events:none; }

    /* Sueldos */
    .sueldo-lista { display:flex; flex-direction:column; gap:8px; }
    .sueldo-row   { display:flex; gap:8px; align-items:center; }
    .sueldo-nombre { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; -webkit-appearance:none; }
    .sueldo-monto  { width:110px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); padding:12px 14px; font-size:14px; font-family:'DM Sans',sans-serif; color:var(--text); outline:none; -webkit-appearance:none; }
    .sueldo-nombre:focus, .sueldo-monto:focus { border-color:var(--accent); }
    .btn-del-sueldo { background:none; border:none; cursor:pointer; color:var(--error); font-size:18px; padding:4px 6px; line-height:1; }
    .btn-add-sueldo { background:var(--surface); border:1px dashed var(--border); border-radius:var(--r-sm); padding:10px; font-size:13px; color:var(--text-dim); cursor:pointer; width:100%; text-align:center; transition:border-color var(--t), color var(--t); font-family:'DM Sans',sans-serif; }
    .btn-add-sueldo:hover { border-color:var(--accent); color:var(--accent); }

    /* Neto calculado */
    .neto-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px 20px; display:flex; align-items:center; justify-content:space-between; }
    .neto-left  { font-size:12px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--text-dim); }
    .neto-valor { font-family:'Bebas Neue',sans-serif; font-size:42px; line-height:1; color:var(--accent); }
    .neto-valor.negativo { color:var(--error); }

    /* Resumen de evidencias */
    .ev-lista   { display:flex; flex-direction:column; gap:6px; }
    .ev-row     { display:flex; align-items:center; gap:10px; padding:10px 14px; background:var(--surface); border-radius:var(--r-sm); border:1px solid var(--border); }
    .ev-icon    { font-size:14px; flex-shrink:0; }
    .ev-label   { flex:1; font-size:13px; color:var(--text); }
    .ev-status  { font-size:11px; font-weight:600; }
    .ev-status.listo   { color:var(--success); }
    .ev-status.omitida { color:var(--text-muted); }

    /* Pantalla éxito */
    .exito-screen { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 24px; text-align:center; background:var(--bg); }
    .exito-icon   { font-size:72px; margin-bottom:16px; animation:fadeIn .5s ease; }
    .exito-titulo { font-family:'Bebas Neue',sans-serif; font-size:58px; line-height:.95; margin-bottom:10px; }
    .exito-suc    { font-size:12px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
    .exito-sub    { font-size:14px; color:var(--text-dim); line-height:1.65; margin-bottom:30px; max-width:320px; }

    /* Intro cierre */
    .intro-screen { min-height:100vh; display:flex; flex-direction:column; }
    .intro-body   { flex:1; padding:28px 22px 40px; max-width:500px; margin:0 auto; width:100%; display:flex; flex-direction:column; gap:22px; }
    .intro-turno  { font-family:'Bebas Neue',sans-serif; font-size:52px; line-height:.95; }
    .intro-turno span { color:var(--accent); }
    .intro-meta   { font-size:13px; color:var(--text-dim); }
    .intro-lista  { display:flex; flex-direction:column; gap:8px; }
    .intro-item   { display:flex; align-items:center; gap:12px; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--r-sm); }
    .intro-item-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .intro-item-dot.oblig { background:var(--accent); }
    .intro-item-dot.opcl  { background:var(--purple); }
    .intro-item-txt { font-size:13px; flex:1; }
    .intro-item-badge { font-size:10px; font-weight:600; color:var(--text-muted); }

// Llamada al Apps Script vía fetch (compatible con Chrome Mobile)
function callScript(params) {
  const qs = Object.entries(params)
    .map(([k,v]) => `${encodeURIComponent(k)}=${encodeURIComponent(String(v))}`)
    .join('&');

  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 20000);

  return fetch(`${APPS_SCRIPT_URL}?${qs}`, {
    method: 'GET',
    redirect: 'follow',
    signal: controller.signal
  })
    .then(r => {
      clearTimeout(timeout);
      if (!r.ok) throw new Error('Error del servidor (' + r.status + ')');
      return r.json();
    })
    .catch(err => {
      clearTimeout(timeout);
      if (err.name === 'AbortError') {
        throw new Error('El servidor tardó demasiado. Inténtalo de nuevo.');
      }
      throw new Error('Sin conexión. Verifica tu internet e inténtalo de nuevo.');
    });
}

function jsonFetch(url, options, timeoutMs = 20000) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);

  return fetch(url, { ...options, signal: controller.signal })
    .then(r => {
      clearTimeout(timeout);
      if (!r.ok) throw new Error('Error del servidor (' + r.status + ')');
      return r.json();
    })
    .catch(err => {
      clearTimeout(timeout);
      if (err.name === 'AbortError') {
        throw new Error('El servidor tardó demasiado. Inténtalo de nuevo.');
      }
      throw err;
    });
}

// Preparado para Fase 2: login por POST cuando Apps Script ya lo soporte.
async function loginSeguro(params) {
  try {
    const res = await jsonFetch(APPS_SCRIPT_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(params)
    });

    const backendSinPost = !res.success && /fase 1|implementad/i.test(String(res.error || ''));
    if (!backendSinPost) return res;
  } catch (err) {
    if (err.message && err.message.includes('tardó demasiado')) throw err;
  }

  return callScript(params);
}

// ─── Utilidades de fecha ──────────────────────────────────────────────────────
function getFechaArchivo() {
  const n = new Date();
  return `${String(n.getDate()).padStart(2,'0')}-${String(n.getMonth()+1).padStart(2,'0')}-${n.getFullYear()}`;
}
function getMesNombre() {
  return ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
          'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'][new Date().getMonth()];
}
function getMesNombreDeFecha(fecha) {
  const partes = String(fecha || '').split('-');
  const mes = parseInt(partes[1], 10);
  const meses = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
          'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
  return meses[(mes || 1) - 1] || getMesNombre();
}
function getAnioDeFecha(fecha) {
  const partes = String(fecha || '').split('-');
  return partes[2] || getAnio();
}
function getAnio() { return String(new Date().getFullYear()); }
function getHoraCorta() {
  const n = new Date();
  return `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}


// Extrae montos automáticos de los registros de evidencias
function calcularMontosAuto(registros) {
  const auto = {
    ventas_totales:   null,
    tarjeta:          null,
    gastos:           null,
    cancelados:       null,
    efectivo_neto:    null,
    total_tickets:    null,
    efectivo_contado: null,
  };

  for (const reg of registros) {
    if (reg.estado !== 'listo' || !reg.importe) continue;
    const val = parseFloat(reg.importe);
    if (isNaN(val)) continue;
    const cfg = IMPORTE_CONFIG[reg.id] || IMPORTE_CONFIG.default;
    if (!cfg.tipo) continue;

    // Solo toma el primero (vouchers tiene prioridad sobre terminal para tarjeta)
    if (cfg.tipo === 'tarjeta' && auto.tarjeta === null) {
      auto.tarjeta = val;
    } else if (cfg.tipo === 'gastos' && auto.gastos === null) {
      auto.gastos = val;
    } else if (cfg.tipo === 'cancelados' && auto.cancelados === null) {
      auto.cancelados = val;
    } else if (cfg.tipo === 'efectivo_neto' && auto.efectivo_neto === null) {
      auto.efectivo_neto = val;
    } else if (cfg.tipo === 'ventas_totales' && auto.ventas_totales === null) {
      auto.ventas_totales = val;
    } else if (cfg.tipo === 'total_tickets' && auto.total_tickets === null) {
      auto.total_tickets = val;
    } else if (cfg.tipo === 'efectivo_contado' && auto.efectivo_contado === null) {
      auto.efectivo_contado = val;
    }
  }
  return auto;
}

function moneyVal(v) {
  const n = parseFloat(v);
  return isNaN(n) ? 0 : n;
}

function calcularFinanzas(montosData, sueldosTotal, montosAuto) {
  const ventasTotales = moneyVal(montosAuto?.ventas_totales);
  const tarjeta       = moneyVal(montosData.tarjeta) || moneyVal(montosAuto?.tarjeta);
  const gastos        = moneyVal(montosData.gastos)  || moneyVal(montosAuto?.gastos);
  const extras        = moneyVal(montosData.extras);
  const efectivoReal  = moneyVal(montosData.efectivo);
  const pendiente     = moneyVal(montosData.pendiente);
  const efectivoTotal  = efectivoReal + pendiente;
  const efectivoCapturado = String(montosData.efectivo || '').trim() !== '';
  const efectivoEsperado = ventasTotales - tarjeta - sueldosTotal - gastos - extras;
  const diferencia = efectivoTotal - efectivoEsperado;
  return {
    ventasTotales,
    tarjeta,
    gastos,
    extras,
    efectivoReal,
    efectivoTotal,
    pendiente,
    efectivoCapturado,
    faltante: efectivoCapturado && diferencia < 0 ? Math.abs(diferencia) : 0,
    sobrante: efectivoCapturado && diferencia > 0 ? diferencia : 0,
    efectivoNeto: efectivoTotal,
  };
}

function IndicadorConexion() {
  const [online, setOnline] = React.useState(navigator.onLine);
  React.useEffect(() => {
    const on  = () => setOnline(true);
    const off = () => setOnline(false);
    window.addEventListener('online',  on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);
  if (online) return null;
  return (
    <div className="conexion-banner">
      <div className="conexion-dot" />
      Sin conexión — las fotos se subirán cuando recuperes internet
    </div>
  );
}

}

async function subirExcel(session, turno, registros, montosData, efectivoNeto, sueldosTotal, montosAuto) {
  try {
    const base64    = generarExcelBase64(session, turno, registros, montosData, efectivoNeto, sueldosTotal, montosAuto);
    const fecha     = getFechaArchivo();
    const mes       = getMesNombre();
    const anio      = getAnio();
    const nombreLimpio = (session.nombre||'Empleado').replace(/\s+/g,'');
    const turnoLabel   = turno === 'arqueo' ? 'Arqueo' : 'Cierre' + turno;
    const nombreArch   = `RESUMEN_${turnoLabel}_${nombreLimpio}_${fecha}.xlsx`;

    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'subirExcel',
        sucursal: session.sucursal,
        turno: String(turno),
        fecha, mes, anio,
        nombre: session.nombre,
        nombreArchivo: nombreArch,
        base64,
      })
    });
    // No bloquear si falla — el cierre ya fue enviado
  } catch(e) {
    console.warn('Excel no subido:', e.message);
  }
}

    'TICKETS 20 MIN','TICKETS 30 MIN','TICKETS 40 MIN','TICKETS 60 MIN',
    'TICKETS LIMPIEZA','CORTESIAS'
  ];

    reg.fecha, sucursalExcel || reg.sucursal, getBrand(reg.sucursal),
    ventaCorte1, ventaCorte2, ventasTotales,

    extras > 0 ? 'EXTRAS' : '', extras,
    gastos > 0 ? 'GASTOS' : '', gastos, '', '',
    totalSalidasEfectivo, totalEfectivoExcel, reg.totalTickets || '', reg.ticketsCanceladosCorte || '',
    '', '', '', '', '', '',
  ]];

    if (!cell) return;
    const editable = /FALTANTES|SOBRANTES|CAMBIO|CLASIFICACION|IMPORTE|TICKETS|CORTESIAS/i.test(h);
    cell.s = {
      fill: { fgColor: { rgb: editable ? 'FFF7D6' : 'F2F4F7' } },
      font: { bold: true, color: { rgb: '000000' } },
      alignment: { horizontal: 'center', vertical: 'center', wrapText: true }
    };
  });
  XLSX.utils.book_append_sheet(wb, ws1, 'Resumen');

  const ws2 = XLSX.utils.aoa_to_sheet([
    ['RESUMEN CORREGIDO DESDE MAESTRO'], [], ['Sucursal', reg.sucursal],
    ['Turno', turno === 'arqueo' ? 'Arqueo' : 'Cierre ' + turno],
    ['Empleado', reg.empleado || ''], ['Estado', reg.estado || 'MODIFICADO'], [],
    ['Concepto','Monto'], ['Ventas Totales', ventasTotales], ['Pago con Tarjeta', tarjeta],
    ['Efectivo contado manual', efectivo], ['Pendiente de Depositar', pendiente],
    ['Sueldos', sueldos], ['Gastos', gastos], ['Extras', extras],
    ['Faltante', faltante], ['Sobrante', sobrante],
    ['Efectivo calculado Excel', efectivoExcel],
    ['Total salidas efectivo', totalSalidasEfectivo],
    ['TOTAL EFECTIVO', totalEfectivoExcel],
  ]);
  ws2['!cols'] = [{wch:28},{wch:18}];
  XLSX.utils.book_append_sheet(wb, ws2, 'Montos');
  return XLSX.write(wb, { bookType:'xlsx', type:'base64' });
}

// ─── Comprimir imagen ─────────────────────────────────────────────────────────
function compressImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.72));
      };
      img.onerror = () => reject(new Error('No se pudo procesar la imagen'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('No se pudo leer el archivo'));
    reader.readAsDataURL(file);
  });
}

// ─── Subir foto a Drive vía Apps Script ──────────────────────────────────────
async function subirFoto(payload, intentos = 0) {
  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'subirFoto', ...payload })
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Error en servidor');
    return data;
  } catch(err) {
    if (intentos < 2) {
      await new Promise(r => setTimeout(r, 1500 * (intentos + 1)));
      return subirFoto(payload, intentos + 1);
    }
    throw err;
  }
}

// ─── Formato moneda ───────────────────────────────────────────────────────────
function fmtPeso(n) {
  if (isNaN(n)) return '$0.00';
  return '$' + Number(n).toLocaleString('es-MX', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

// ═══════════════════════════════════════════════════════════════════════════════════
// FLUJO CIERRE — Componente principal Fase 2
// ═══════════════════════════════════════════════════════════════════════════════════
function FlujoCierre({ session, turno, onVolver, onCompletado }) {
  const { useState: useS, useRef: useR, useEffect: useE } = React;

  const pasos     = EVIDENCIAS[turno];
  const fechaArch = getFechaArchivo();
  const mes       = getMesNombre();
  const anio      = getAnio();
  const esArqueo  = turno === 'arqueo';

  // Estado principal
  const [screen,    setScreen]    = useS('intro');
  // screen: intro|pregunta|foto|montos|reporte|resumen|exito|editando

  const [pasoIdx,   setPasoIdx]   = useS(0);
  const [registros, setRegistros] = useS([]);
  // registro: { id, label, estado, hora, fotos:[base64], importe, comentario }

  const [montosData, setMontosData] = useS({
    tarjeta:'', efectivo:'', gastos:'', extras:'',
    faltante:'', sobrante:'', pendiente:'',
    sueldos:[{ nombre:'', monto:'' }]
  });

  // Estado del paso actual
  const [fotosActuales, setFotosActuales] = useS([]);  // base64[]
  const [importe,       setImporte]       = useS('');
  const [comentario,    setComentario]    = useS('');
  const [ticketsCanceladosCorte, setTicketsCanceladosCorte] = useS('');
  const [ticketTiempos, setTicketTiempos] = useS({ t20:'', t30:'', t40:'', t60:'', limpieza:'' });
  const [gastosDetalle, setGastosDetalle] = useS([{ clasificacion:'', monto:'' }]);
  const [errorMsg,      setErrorMsg]      = useS('');
  const [subiendo,      setSubiendo]      = useS(false);
  const [fotoModal,     setFotoModal]     = useS(null); // base64 para modal
  const [editandoIdx,   setEditandoIdx]   = useS(null); // índice del registro que se edita

  const fileRef     = useR(null);
  const galeriaRef  = useR(null);

  const paso = pasos ? pasos[pasoIdx] : null;
  const progPct = pasos ? Math.round((registros.length / pasos.length) * 100) : 0;
  const hayVouchers = registros.some(r => r.id === 'vouchers' && r.estado === 'listo');
  const canceladosRequeridos = registros.some(r =>
    r.id === 'reporte_corte' && r.estado === 'listo' && (parseFloat(r.ticketsCanceladosCorte)||0) > 0
  );

  // ── Montos calculados ───────────────────────────────────────────────────────
  const sueldosTotal = montosData.sueldos.reduce((s,r) => s + (parseFloat(r.monto)||0), 0);
  const montosAuto = calcularMontosAuto(registros);
  const totalTicketsCorte = montosAuto.total_tickets || 0;
  const reporteCorteActual = registros.find(r => r.id === 'reporte_corte' && r.estado === 'listo');
  const ticketsCanceladosDelCorte = reporteCorteActual?.ticketsCanceladosCorte || '';
  const ticketTiemposDelCorte = reporteCorteActual?.ticketTiempos || {};
  const cortesiasDelTurno = registros.find(r => r.id === 'cortesias' && r.estado === 'listo')?.importe || '';
  const finanzas = calcularFinanzas(montosData, sueldosTotal, montosAuto);
  const efectivoNeto = finanzas.efectivoNeto;

  // ── Iniciar ─────────────────────────────────────────────────────────────────
  const iniciar = () => {
    setPasoIdx(0); setRegistros([]); setErrorMsg('');
    limpiarPaso();
    setScreen(pasos[0].obligatoria ? 'foto' : 'pregunta');
  };

  const limpiarPaso = () => {
    setFotosActuales([]); setImporte(''); setComentario(''); setTicketsCanceladosCorte('');
    setTicketTiempos({ t20:'', t30:'', t40:'', t60:'', limpieza:'' });
    setGastosDetalle([{ clasificacion:'', monto:'' }]); setErrorMsg('');
  };

  // ── Cámara / Galería ────────────────────────────────────────────────────────
  const abrirCamara  = () => { setErrorMsg(''); fileRef.current.click(); };
  const abrirGaleria = () => { setErrorMsg(''); galeriaRef.current.click(); };

  const handleFiles = async (files) => {
    if (!files || files.length === 0) return;
    const nuevas = [];
    for (const file of Array.from(files)) {
      try {
        const b64 = await compressImage(file);
        nuevas.push(b64);
      } catch(e) { /* skip */ }
    }
    setFotosActuales(prev => [...prev, ...nuevas]);
  };

  const handleFileChange = (e) => {
    handleFiles(e.target.files);
    e.target.value = '';
  };

  const eliminarFoto = (i) => setFotosActuales(prev => prev.filter((_,j)=>j!==i));

  // ── Validar y avanzar paso ──────────────────────────────────────────────────
  const confirmarPaso = async () => {
    if (fotosActuales.length === 0) { setErrorMsg('Debes tomar o seleccionar al menos una foto.'); return; }
    const detalleGastosLimpio = gastosDetalle
      .map(g => ({ clasificacion:String(g.clasificacion||'').trim(), monto:String(g.monto||'').trim() }))
      .filter(g => g.clasificacion || g.monto);
    const importeFinal = paso.id === 'gastos'
      ? String(detalleGastosLimpio.reduce((s,g)=>s+(parseFloat(g.monto)||0),0))
      : importe;
    if (!importeFinal.trim() || parseFloat(importeFinal) <= 0) { setErrorMsg('El importe es obligatorio.'); return; }
    if (paso.id === 'reporte_corte') {
      const sumaTiempos = ['t20','t30','t40','t60','limpieza'].reduce((s,k)=>s+(parseFloat(ticketTiempos[k])||0),0);
      const totalTickets = parseFloat(importeFinal) || 0;
      if (sumaTiempos !== totalTickets) {
        setErrorMsg(`El Total de Tickets (${totalTickets}) debe ser igual a la suma por tiempos (${sumaTiempos}).`);
        return;
      }
    }
    if (paso.id === 'gastos' && (
      detalleGastosLimpio.length === 0 ||
      detalleGastosLimpio.some(g => !CLASIFICACIONES_GASTO.includes(g.clasificacion) || (parseFloat(g.monto)||0) <= 0)
    )) {
      setErrorMsg('Clasifica cada gasto y captura su importe.');
      return;
    }
    if (paso.id === 'gastos' && fotosActuales.length < detalleGastosLimpio.length) {
      setErrorMsg(`Debes subir una foto por cada concepto de gasto. Capturaste ${detalleGastosLimpio.length} concepto(s), faltan foto(s).`);
      return;
    }

    const regActual = {
      id:paso.id, label:paso.label, estado:'listo',
      hora:getHoraCorta(), fotos:fotosActuales, importe:importeFinal,
      comentario, ticketsCanceladosCorte, ticketTiempos, gastosDetalle:detalleGastosLimpio
    };
    const registrosValidacion = editandoIdx !== null
      ? registros.map((r,i) => i === editandoIdx ? { ...r, ...regActual } : r)
      : [...registros, regActual];
    const listo = (id) => registrosValidacion.find(r => r.id === id && r.estado === 'listo');
    const num = (v) => parseFloat(v) || 0;
    const reporteCorte = listo('reporte_corte');
    const sobreReverso = listo('sobre_reverso');
    if (reporteCorte && sobreReverso && num(reporteCorte.importe) !== num(sobreReverso.importe)) {
      setErrorMsg(`El total de tickets del Reporte de Corte (${reporteCorte.importe}) debe ser igual al Sobre — Reverso (${sobreReverso.importe}).`);
      return;
    }
    const reporteCierre = listo('reporte_arqueo') || listo('reporte_cierre');
    const sobreFrente = listo('sobre_frente');
    if (false && reporteCierre && sobreFrente && num(reporteCierre.importe) !== num(sobreFrente.importe)) {
      setErrorMsg(`El importe del Reporte Cierre (${fmtPeso(num(reporteCierre.importe))}) debe ser igual al Sobre — Frente (${fmtPeso(num(sobreFrente.importe))}).`);
      return;
    }
    const canceladosReg = registrosValidacion.find(r => r.id === 'cancelados');
    const canceladosEsperados = num(reporteCorte?.ticketsCanceladosCorte);
    if (canceladosEsperados > 0 && canceladosReg && canceladosReg.estado !== 'listo') {
      setErrorMsg('Capturaste tickets cancelados en Reporte de Corte; debes subir la evidencia de tickets cancelados.');
      return;
    }
    if (canceladosEsperados > 0 && canceladosReg?.estado === 'listo' && num(canceladosReg.importe) !== canceladosEsperados) {
      setErrorMsg(`Los tickets cancelados de la evidencia (${canceladosReg.importe}) deben ser iguales a los capturados en Reporte de Corte (${canceladosEsperados}).`);
      return;
    }

    setSubiendo(true); setErrorMsg('');
    const errores = [];

    for (let i = 0; i < fotosActuales.length; i++) {
      try {
        const nombreLimpio = (session.nombre||'Empleado').replace(/\s+/g,'');
        const num          = String(pasoIdx+1).padStart(2,'0');
        const sufijo       = fotosActuales.length > 1 ? `_${i+1}` : '';
        const nombreArch   = `${num}_${ARCHIVO_LABELS[paso.id]}${sufijo}_${nombreLimpio}_${fechaArch}.jpg`;
        await subirFoto({ sucursal:session.sucursal, turno:String(turno), fecha:fechaArch, mes, anio, nombre:session.nombre, nombreArchivo:nombreArch, base64:fotosActuales[i] });
      } catch(e) { errores.push(e.message); }
    }

    setSubiendo(false);

    if (errores.length > 0 && errores.length === fotosActuales.length) {
      setErrorMsg('Error al subir: ' + errores[0]);
      return;
    }

    if (editandoIdx !== null) {
      // Modo edición — actualizar registro existente
      setRegistros(prev => prev.map((r,i) => i === editandoIdx
        ? { ...r, ...regActual }
        : r
      ));
      setEditandoIdx(null);
      setScreen('reporte');
    } else {
      setRegistros(prev => [...prev, regActual]);
      limpiarPaso();
      avanzar(paso.id === 'vouchers');
    }
  };

  const omitir = () => {
    if (paso.id === 'terminal' && hayVouchers) {
      setErrorMsg('Si subiste vouchers, también es obligatorio subir el reporte de terminal.');
      setScreen('foto');
      return;
    }
    if (paso.id === 'cancelados' && canceladosRequeridos) {
      setErrorMsg('Capturaste tickets cancelados en Reporte de Corte; debes subir la evidencia de tickets cancelados.');
      setScreen('foto');
      return;
    }
    setRegistros(prev => [...prev, { id:paso.id, label:paso.label, estado:'omitida', hora:null, fotos:[], importe:'', comentario:'' }]);
    limpiarPaso();
    avanzar();
  };

  const avanzar = (forzarTerminal = false) => {
    const sig = pasoIdx + 1;
    if (sig >= pasos.length) { setScreen('montos'); }
    else {
      setPasoIdx(sig);
      const terminalObligatoria = pasos[sig].id === 'terminal' && (forzarTerminal || hayVouchers);
      setScreen((pasos[sig].obligatoria || terminalObligatoria) ? 'foto' : 'pregunta');
    }
  };

  const retroceder = () => {
    if (pasoIdx === 0) { setScreen('intro'); return; }
    const ant = pasoIdx - 1;
    // Restaurar datos del paso anterior si ya fue registrado
    const regAnt = registros[ant];
    if (regAnt) {
      setFotosActuales(regAnt.fotos || []);
      setImporte(regAnt.importe || '');
      setComentario(regAnt.comentario || '');
      setTicketsCanceladosCorte(regAnt.ticketsCanceladosCorte || '');
      setGastosDetalle(regAnt.gastosDetalle?.length ? regAnt.gastosDetalle : [{ clasificacion:'', monto:'' }]);
    } else {
      limpiarPaso();
    }
    // Quitar el último registro (el del paso actual si ya estaba guardado)
    setRegistros(prev => {
      // Solo quitar si el último registro corresponde al paso anterior
      // (el empleado puede estar en paso 2 sin haber registrado paso 1 aún)
      if (prev.length > 0 && prev[prev.length - 1].id === pasos[ant].id) {
        return prev.slice(0, -1);
      }
      return prev;
    });
    setPasoIdx(ant);
    setScreen(pasos[ant].obligatoria ? 'foto' : 'pregunta');
    setErrorMsg('');
  };

  // ── Editar evidencia desde reporte ─────────────────────────────────────────
  const editarEvidencia = (i) => {
    const reg = registros[i];
    setEditandoIdx(i);
    setPasoIdx(i);
    setFotosActuales(reg.fotos || []);
    setImporte(reg.importe || '');
    setComentario(reg.comentario || '');
    setTicketsCanceladosCorte(reg.ticketsCanceladosCorte || '');
    setTicketTiempos(reg.ticketTiempos || { t20:'', t30:'', t40:'', t60:'', limpieza:'' });
    setGastosDetalle(reg.gastosDetalle?.length ? reg.gastosDetalle : [{ clasificacion:'', monto:'' }]);
    setErrorMsg('');
    setScreen('foto');
  };

  // ── Montos ──────────────────────────────────────────────────────────────────
  const setMonto  = (k,v) => setMontosData(prev => ({...prev,[k]:v}));
  const setSueldo = (i,k,v) => setMontosData(prev => { const s=[...prev.sueldos]; s[i]={...s[i],[k]:v}; return {...prev,sueldos:s}; });
  const addSueldo = () => setMontosData(prev => ({...prev,sueldos:[...prev.sueldos,{nombre:'',monto:''}]}));
  const delSueldo = (i) => setMontosData(prev => ({...prev,sueldos:prev.sueldos.filter((_,j)=>j!==i)}));
  const setGastoDetalle = (i,k,v) => setGastosDetalle(prev => {
    const g = [...prev]; g[i] = {...g[i], [k]:v}; return g;
  });
  const setTicketTiempo = (k,v) => setTicketTiempos(prev => ({...prev,[k]:v}));
  const addGastoDetalle = () => setGastosDetalle(prev => [...prev, { clasificacion:'', monto:'' }]);
  const delGastoDetalle = (i) => setGastosDetalle(prev => prev.length > 1 ? prev.filter((_,j)=>j!==i) : [{ clasificacion:'', monto:'' }]);

  // ── Enviar cierre ───────────────────────────────────────────────────────────
  const enviarCierre = async () => {
    if (efectivoNeto < 0) {
      if (!confirm(`El Efectivo Neto es negativo (${fmtPeso(efectivoNeto)}). ¿Deseas continuar de todas formas?`)) return;
    }
    const hora = getHoraCorta();
    // Registrar en Sheet para dashboard antes de mostrar éxito.
    try {
      const res = await apiPost({
        action:'registrarCierre', sucursal:session.sucursal,
        turno:String(turno), fecha:getFechaArchivo(), nombre:session.nombre, hora,
        montos:{
          ventasTotales: finanzas.ventasTotales,
          tarjeta:  finanzas.tarjeta,
          efectivo: finanzas.efectivoReal,
          sueldos:  sueldosTotal,
          gastos:   finanzas.gastos,
          extras:   finanzas.extras,
          faltante: finanzas.faltante,
          sobrante: finanzas.sobrante,
          pendiente:finanzas.pendiente,
          efectivoNeto,
          totalTickets: totalTicketsCorte,
          ticketsCanceladosCorte: ticketsCanceladosDelCorte,
          tickets20Min: parseFloat(ticketTiemposDelCorte.t20)||0,
          tickets30Min: parseFloat(ticketTiemposDelCorte.t30)||0,
          tickets40Min: parseFloat(ticketTiemposDelCorte.t40)||0,
          tickets60Min: parseFloat(ticketTiemposDelCorte.t60)||0,
          ticketsLimpieza: parseFloat(ticketTiemposDelCorte.limpieza)||0,
          cortesias: parseFloat(cortesiasDelTurno)||0,
        }
      });
      if (!res.success) throw new Error(res.error || 'No se pudo registrar el cierre.');
    } catch (e) {
      setErrorMsg('No se pudo registrar el cierre en el dashboard: ' + e.message);
      return;
    }
    marcarCompleto(session.sucursal, turno);
    guardarResumenCierre(session.sucursal, turno, {
      turno, fecha:getFechaArchivo(), hora, nombre:session.nombre, sucursal:session.sucursal,
      registros: registros.map(r => ({...r, fotos: []})),
      montosData, sueldosTotal, montosAuto,
      finanzas: {
        ventasTotales: finanzas.ventasTotales, tarjeta: finanzas.tarjeta,
        efectivo: finanzas.efectivoReal, sueldos: sueldosTotal,
        gastos: finanzas.gastos, extras: finanzas.extras,
        faltante: finanzas.faltante, sobrante: finanzas.sobrante,
        pendiente: finanzas.pendiente, efectivoNeto
      }
    });
    // Subir Excel en segundo plano
    subirExcel(session, turno, registros, montosData, efectivoNeto, sueldosTotal, montosAuto);
    setScreen('exito');
  };

  // ── Inputs ocultos ──────────────────────────────────────────────────────────
  const inputsCamara = (
    <React.Fragment>
      <input ref={fileRef}    type="file" accept="image/*" capture="environment" multiple style={{display:'none'}} onChange={handleFileChange} />

  const modalFoto = fotoModal ? (

  // ── Sección de fotos del paso actual ────────────────────────────────────────
  const seccionFotos = (
    <div>
      {fotosActuales.length > 0 && (
        <div className="fotos-grid" style={{marginBottom:'10px'}}>
          {fotosActuales.map((f,i) => (

        </div>

        <div className="btn-foto-add" onClick={abrirCamara}>
          <span className="bfa-icon">📷</span>Cámara
        </div>
        <div className="btn-foto-add" onClick={abrirGaleria}>
          <span className="bfa-icon">🖼️</span>Galería
        </div>
      </div>
    </div>
  );

  // ── Sección importe + comentario ────────────────────────────────────────────
  const impCfg = paso ? (IMPORTE_CONFIG[paso.id] || IMPORTE_CONFIG.default) : IMPORTE_CONFIG.default;
  const esCantidad = paso && (paso.id === 'cancelados' || paso.id === 'cortesias' || paso.id === 'reporte_corte' || paso.id === 'sobre_reverso');
  const totalGastosDetalle = gastosDetalle.reduce((s,g)=>s+(parseFloat(g.monto)||0),0);
  const gastosConceptosActivos = gastosDetalle
    .map(g => ({ clasificacion:String(g.clasificacion||'').trim(), monto:String(g.monto||'').trim() }))
    .filter(g => g.clasificacion || g.monto);
  const gastosConceptosValidos = gastosConceptosActivos.length > 0
    && gastosConceptosActivos.every(g => CLASIFICACIONES_GASTO.includes(g.clasificacion) && (parseFloat(g.monto)||0) > 0);
  const gastosFotosValidas = paso?.id !== 'gastos' || (gastosConceptosValidos && fotosActuales.length >= gastosConceptosActivos.length);
  const ticketTiemposTotal = ['t20','t30','t40','t60','limpieza']
    .reduce((s,k)=>s+(parseFloat(ticketTiempos[k])||0),0);
  const totalTicketsCapturado = parseFloat(importe) || 0;
  const ticketTiemposCuadran = paso?.id !== 'reporte_corte' || (totalTicketsCapturado > 0 && ticketTiemposTotal === totalTicketsCapturado);
  const seccionCampos = (
    <div className="ev-campos">
      {paso?.id !== 'gastos' && (
        <div>

            {!esCantidad && <span className="ev-peso">$</span>}
            <input className="ev-importe" type="number"
              placeholder={impCfg.placeholder}
              inputMode="decimal"
              style={{paddingLeft: esCantidad ? '14px' : '28px'}}
              value={importe} onChange={e=>{setImporte(e.target.value);setErrorMsg('');}} />
          </div>
        </div>
      )}
      {paso?.id === 'reporte_corte' && (
        <div>
          <div className="ev-campo-label">Tickets cancelados</div>
          <input className="ev-importe" type="number" placeholder="0" inputMode="numeric"
            value={ticketsCanceladosCorte}
            onChange={e=>{setTicketsCanceladosCorte(e.target.value);setErrorMsg('');}} />
          <div style={{fontSize:'11px',color:'var(--text-muted)',marginTop:'4px'}}>
            Si capturas una cantidad mayor a 0, la evidencia de tickets cancelados será obligatoria.
          </div>
          <div className="ev-campo-label" style={{marginTop:'12px'}}>Tickets por tiempo</div>
          <div className="ticket-tiempo-grid">
            <input className="ev-importe" type="number" placeholder="20 min" inputMode="numeric"
              value={ticketTiempos.t20} onChange={e=>setTicketTiempo('t20',e.target.value)} />
            <input className="ev-importe" type="number" placeholder="30 min" inputMode="numeric"
              value={ticketTiempos.t30} onChange={e=>setTicketTiempo('t30',e.target.value)} />
            <input className="ev-importe" type="number" placeholder="40 min" inputMode="numeric"
              value={ticketTiempos.t40} onChange={e=>setTicketTiempo('t40',e.target.value)} />
            <input className="ev-importe" type="number" placeholder="60 min" inputMode="numeric"
              value={ticketTiempos.t60} onChange={e=>setTicketTiempo('t60',e.target.value)} />
            <input className="ev-importe" type="number" placeholder="Limpieza" inputMode="numeric"
              value={ticketTiempos.limpieza} onChange={e=>setTicketTiempo('limpieza',e.target.value)} />

          </div>
        </div>
      ) : (
        <div>
          <div className="ev-campo-label">Comentario <span style={{color:'var(--text-muted)',fontWeight:400,textTransform:'none',letterSpacing:0}}>(opcional)</span></div>
          <textarea className="ev-comentario" placeholder="Observaciones, notas del turno..."
            value={comentario} onChange={e=>setComentario(e.target.value)} rows={2} />
        </div>
      )}
    </div>

  // ════════════════ RENDERS ════════════════

  // ── INTRO ────────────────────────────────────────────────────────────────────

    <div className={`intro-screen slide-up ${getFondoClass(session.sucursal)}`}>

          <div className="intro-meta">{getFechaLarga()}</div>

        {!esArqueo && <div className="monto-field">

              </div>

            <button className="btn-add-sueldo" onClick={addSueldo}>+ Agregar empleado</button>
          </div>
          {sueldosTotal > 0 && <div style={{fontSize:'12px',color:'var(--text-dim)',marginTop:'4px'}}>Total sueldos: {fmtPeso(sueldosTotal)}</div>}
        </div>}
        <div>
          <div className="section-label" style={{marginBottom:'10px'}}>Evidencias del turno</div>
          <div className="intro-lista">
            {pasos.map(p => (
              <div key={p.id} className="intro-item">
                <div className={`intro-item-dot ${p.obligatoria?'oblig':'opcl'}`} />
                <div className="intro-item-txt">{p.label}</div>
                <div className="intro-item-badge">{p.obligatoria ? 'Obligatoria' : 'Opcional'}</div>
              </div>
            ))}
          </div>
        </div>
        <button className="btn btn-primary" onClick={iniciar}>Comenzar →</button>
      </div>
    </div>
  );

  // ── PREGUNTA ─────────────────────────────────────────────────────────────────
  if (screen === 'pregunta') return (
    <div className="home-screen slide-up">
      {inputsCamara}{modalFoto}
      <div className="screen-header">
        <button className="header-back" onClick={retroceder} aria-label="Paso anterior">‹</button>
        <div>
          <div className="header-title">{esArqueo?'Arqueo':'Cierre '+turno} · Paso {pasoIdx+1}/{pasos.length}</div>
          <div style={{display:'flex',alignItems:'center',gap:'5px'}}>
            <span className={`marca-pill ${getMarcaClass(session.sucursal)}`} style={{fontSize:'9px',padding:'2px 7px'}}>{getBrand(session.sucursal)}</span>
            <span className="header-sub">{shortSuc(session.sucursal)}</span>
          </div>
        </div>
      </div>
      <div className="paso-wrap">
        <div className="ev-instruccion-top">
          <strong>{paso.label}</strong><br />
          {paso.instruccion}
        </div>
        <div>
          <div className="prog-wrap"><div className="prog-fill" style={{width:progPct+'%'}} /></div>
          <div className="prog-label"><span>{registros.length} de {pasos.length}</span><span>{progPct}%</span></div>
        </div>
        <div>
          <span className="paso-badge badge-opcl">Opcional</span>
          <div className="paso-titulo" style={{marginTop:'8px'}}>{paso.label}</div>
        </div>
        <div className="pregunta-titulo">¿Tuviste {paso.label.toLowerCase()} en este turno?</div>
        <div className="pregunta-grid">
          <div className="pq-btn si" onClick={()=>setScreen('foto')}>
            <div className="pq-icon">📷</div>
            <div className="pq-label">Sí, tengo</div>
            <div className="pq-sub">Registrar evidencia</div>

          <div className="pq-btn no" onClick={omitir}>
            <div className="pq-icon">⏭</div>
            <div className="pq-label">No aplica</div>
            <div className="pq-sub">Saltar este paso</div>
          </div>
        </div>
      </div>
    </div>

  // ── FOTO (captura + importe + comentario) ────────────────────────────────────
  if (screen === 'foto') return (
    <div className="home-screen slide-up">
      {inputsCamara}{modalFoto}
      <div className="screen-header">
        {editandoIdx === null && (
          <button className="header-back" onClick={retroceder} aria-label="Paso anterior">‹</button>
        )}
        <div>
          <div className="header-title">
            {editandoIdx !== null ? 'Editar evidencia' : `${esArqueo?'Arqueo':'Cierre '+turno} · Paso ${pasoIdx+1}/${pasos.length}`}
          </div>
          <div className="header-sub">{shortSuc(session.sucursal)}</div>
        </div>
      </div>
      <div className="paso-wrap">
        <div className="ev-instruccion-top">
          <strong>{paso.label}</strong><br />
          {paso.instruccion}
        </div>
        {editandoIdx === null && (
          <div>
            <div className="prog-wrap"><div className="prog-fill" style={{width:progPct+'%'}} /></div>
            <div className="prog-label"><span>{registros.length} de {pasos.length}</span><span>{progPct}%</span></div>
          </div>
        )}
        <div>
          <span className={`paso-badge ${paso.obligatoria?'badge-oblig':'badge-opcl'}`}>
            {paso.obligatoria?'Obligatoria':'Opcional'}
          </span>
          <div className="paso-titulo" style={{marginTop:'8px'}}>{paso.label}</div>
        </div>

        {errorMsg && <div className="msg msg-error">{errorMsg}</div>}

        {seccionFotos}
        {seccionCampos}

        {subiendo ? (
          <div className="subiendo-box">
            <div className="subiendo-icon">⏳</div>
            <div className="subiendo-txt">Subiendo a Drive...</div>
            <div className="subiendo-sub">No cierres la app</div>
          </div>
        ) : (
          <button className="btn btn-primary" onClick={confirmarPaso}
            disabled={fotosActuales.length === 0 || (paso.id === 'gastos' ? !gastosFotosValidas : (paso.id === 'reporte_corte' ? !ticketTiemposCuadran : !importe.trim()))}>
            {editandoIdx !== null ? 'Guardar cambios ✓' : 'Confirmar y continuar →'}
          </button>
